<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>土木ゲーム 第1弾 試作</title>
<style>
  :root {
    --dig: #e07a1c;     /* 削る＝オレンジ */
    --fill: #2faa55;    /* 盛る＝みどり */
    --ink: #20303a;
    --panel: rgba(255,255,255,0.82);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #bfe3f2;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; overscroll-behavior: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* 上部：削った土の量 */
  #hud-top {
    position: fixed; top: env(safe-area-inset-top, 8px); left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px; pointer-events: none; padding: 8px env(safe-area-inset-right,8px) 0 env(safe-area-inset-left,8px);
  }
  .badge {
    background: var(--panel); color: var(--ink); border-radius: 14px;
    padding: 7px 14px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    font-variant-numeric: tabular-nums;
  }
  .badge small { font-weight: 700; opacity: .7; font-size: .72em; }
  #dug.pop { animation: pop .28s ease; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.28)} 100%{transform:scale(1)} }
  #carry-badge.full { animation: fullflash .5s ease; background: #ffe08a; }
  @keyframes fullflash { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

  /* 目標バー */
  #goal {
    position: fixed; top: calc(env(safe-area-inset-top,8px) + 52px); left: 50%; transform: translateX(-50%);
    width: min(64vw, 320px); background: var(--panel); border-radius: 12px; padding: 7px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); pointer-events: none; max-width: calc(100vw - 24px);
  }
  #goal .label { font-size: 12px; font-weight: 700; color: var(--ink); opacity: .8; margin-bottom: 4px; }
  #bar { height: 9px; background: #d6dee2; border-radius: 6px; overflow: hidden; }
  #bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#7bc47f,#2faa55); transition: width .15s ease; }

  /* 左下：FPS風 方向パッド */
  #dpad {
    position: fixed; left: calc(env(safe-area-inset-left,0px) + 16px); bottom: calc(env(safe-area-inset-bottom,0px) + 18px);
    display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 6px; z-index: 4;
  }
  .dbtn {
    border: none; border-radius: 14px; background: var(--panel); color: var(--ink); font-size: 24px; font-weight: 900;
    box-shadow: 0 3px 10px rgba(0,0,0,.2); display: flex; align-items: center; justify-content: center; touch-action: none;
  }
  .dbtn:active, .dbtn.on { background: #cfe0ea; transform: scale(.94); }
  #d-up { grid-area: 1 / 2 / 2 / 3; }
  #d-left { grid-area: 2 / 1 / 3 / 2; }
  #d-right { grid-area: 2 / 3 / 3 / 4; }
  #d-down { grid-area: 3 / 2 / 4 / 3; }

  /* 右下：動作ボタン（押している間だけ 削る/盛る） */
  #act {
    position: fixed; right: calc(env(safe-area-inset-right,0px) + 18px); bottom: calc(env(safe-area-inset-bottom,0px) + 22px);
    width: 96px; height: 96px; border-radius: 50%; border: none; color: #fff; font-weight: 900; font-size: 21px;
    background: var(--dig); box-shadow: 0 6px 16px rgba(0,0,0,.28); cursor: pointer; line-height: 1.1; z-index: 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none;
  }
  #act span { font-size: 11px; font-weight: 700; opacity: .9; }
  #act.on { transform: scale(.93); filter: brightness(1.12); }

  /* 右上：リセット */
  #reset {
    position: fixed; right: calc(env(safe-area-inset-right,0px) + 14px); top: calc(env(safe-area-inset-top,0px) + 12px);
    background: var(--panel); color: var(--ink); border: none; border-radius: 12px; padding: 10px 13px;
    font-weight: 800; box-shadow: 0 3px 10px rgba(0,0,0,.18); cursor: pointer; z-index: 4; font-size: 13px;
  }
  #reset:active { transform: scale(.95); }

  /* 中央フラッシュ（モード切替） */
  #flash {
    position: fixed; left: 50%; top: 44%; transform: translate(-50%,-50%);
    font-weight: 900; font-size: 40px; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; z-index: 4;
  }
  #flash.show { animation: flash .7s ease; }
  @keyframes flash { 0%{opacity:0; transform:translate(-50%,-40%) scale(.8)} 25%{opacity:1} 100%{opacity:0; transform:translate(-50%,-55%) scale(1.1)} }

  /* ヒント */
  #hint {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    background: rgba(0,0,0,.55); color: #fff; padding: 9px 16px; border-radius: 18px; font-weight: 700; font-size: 13px;
    pointer-events: none; transition: opacity .5s ease; text-align: center; max-width: 86vw; line-height: 1.6;
  }

  /* 完成オーバーレイ */
  #win {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column;
    background: rgba(10,30,40,.55); color: #fff; text-align: center; z-index: 8; gap: 14px;
  }
  #win.show { display: flex; animation: fade .4s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #win h1 { font-size: 44px; margin: 0; text-shadow: 0 3px 16px rgba(0,0,0,.5); }
  #win p { margin: 0; font-size: 18px; font-weight: 700; }
  #again {
    margin-top: 6px; background: var(--fill); color: #fff; border: none; border-radius: 14px;
    padding: 14px 30px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 6px 16px rgba(0,0,0,.3);
  }

  /* 縦持ち案内（小さいトースト・画面は隠さない） */
  #rotate {
    position: fixed; top: calc(env(safe-area-inset-top,8px) + 96px); left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.6); color: #fff; padding: 8px 14px; border-radius: 16px; font-weight: 700; font-size: 13px;
    pointer-events: none; opacity: 0; transition: opacity .4s ease; z-index: 6; white-space: nowrap;
  }
  #rotate.show { opacity: 1; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="hud-top">
    <div class="badge"><span id="dug">0.0</span> <small>m³ 削った土</small></div>
    <div class="badge" id="carry-badge"><span id="carry">0.0</span> <small>m³ ブレードの土</small></div>
  </div>

  <div id="goal">
    <div class="label">目標：地面を平らにしよう（山を削り、くぼ地を埋める）</div>
    <div id="bar"><i></i></div>
  </div>

  <!-- 左下：方向パッド -->
  <div id="dpad">
    <button class="dbtn" id="d-up" data-dir="up" aria-label="前">▲</button>
    <button class="dbtn" id="d-left" data-dir="left" aria-label="左">◀</button>
    <button class="dbtn" id="d-right" data-dir="right" aria-label="右">▶</button>
    <button class="dbtn" id="d-down" data-dir="down" aria-label="後">▼</button>
  </div>

  <button id="act">ならす<span>押す</span></button>
  <button id="reset">最初から</button>

  <div id="flash"></div>
  <div id="hint">左下で移動／<b>押しながら進む</b>と土を削って前へ押す（重機と同じ）<br>高い所を削り、そのままくぼ地へ押し込んで埋める・画面ドラッグで視点（PCはスペース）</div>
  <div id="rotate">📱 横向きがおすすめ</div>

  <div id="win">
    <h1>完成！</h1>
    <p id="win-text">整地おつかれさま</p>
    <button id="again">もう一度</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  "use strict";
  (function () {
    if (!window.THREE) { document.body.innerHTML = "<p style='color:#fff;padding:20px'>3D部品(Three.js)の読み込みに失敗しました。ネット接続を確認してください。</p>"; return; }

    // ===================== 設定 =====================
    const GRID = 24, WORLD = 24, V = GRID + 1;
    const CELL_AREA = (WORLD / GRID) * (WORLD / GRID);
    const MIN_H = -4, MAX_H = 9;
    const MOVE_SPEED = 7;
    const DIG_RADIUS = 2.2, DIG_RATE = 18;
    const FLAT_TOL = 0.4, WIN_AT = 0.9;
    const CAM_DIST = 26, LOOK_SENS = 0.005, PITCH_MIN = 0.45, PITCH_MAX = 1.30;

    // ===================== ルール層 =====================
    const heights = new Float32Array(V * V);
    const baseHeights = new Float32Array(V * V);
    const vx = new Float32Array(V * V), vz = new Float32Array(V * V);
    const game = { blade: 0, totalDug: 0, initialFlat: 1, mx: 0, mz: 6, myaw: Math.PI, won: false };
    let camYaw = 0, camPitch = 0.95, pushing = false, cutHeight = 0;

    for (let j = 0; j < V; j++) for (let i = 0; i < V; i++) {
      const idx = j * V + i; vx[idx] = (i / GRID - 0.5) * WORLD; vz[idx] = (j / GRID - 0.5) * WORLD;
    }
    function gauss(x, z, cx, cz, h, s) { const d2 = (x - cx) * (x - cx) + (z - cz) * (z - cz); return h * Math.exp(-d2 / (2 * s * s)); }
    function generateTerrain() {
      const hx = -4 + (Math.random() - 0.5) * 4, hz = -2 + (Math.random() - 0.5) * 4, hH = 3.6 + Math.random() * 1.2;
      const px = 5 + (Math.random() - 0.5) * 3, pz = 5 + (Math.random() - 0.5) * 3;
      for (let idx = 0; idx < V * V; idx++) {
        const x = vx[idx], z = vz[idx];
        let h = gauss(x, z, hx, hz, hH, 3.0) - gauss(x, z, px, pz, 1.8, 2.4) + (Math.random() - 0.5) * 0.15;
        if (h < MIN_H) h = MIN_H; if (h > MAX_H) h = MAX_H;
        heights[idx] = h;
      }
      baseHeights.set(heights); game.initialFlat = Math.max(1, flatness());
    }
    // 「平ら」＝全体が同じ高さになっているか（平均からのズレ）。どの高さに揃えてもOK（ひと押しで全体を均せば勝てる）。
    function flatness() { let mean = 0; for (let idx = 0; idx < V * V; idx++) mean += heights[idx]; mean /= V * V; let s = 0; for (let idx = 0; idx < V * V; idx++) { const d = Math.abs(heights[idx] - mean); if (d > FLAT_TOL) s += (d - FLAT_TOL) * CELL_AREA; } return s; }

    // ===================== 描画層 =====================
    const app = document.getElementById("app");
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0xbfe3f2, 1);
    app.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbfe3f2, 42, 95);
    const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 500);
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 0.95); sun.position.set(-6, 12, 7); scene.add(sun);

    const positions = new Float32Array(V * V * 3), colors = new Float32Array(V * V * 3), indices = [];
    for (let j = 0; j < GRID; j++) for (let i = 0; i < GRID; i++) {
      const a = j * V + i, b = j * V + (i + 1), c = (j + 1) * V + i, d = (j + 1) * V + (i + 1);
      indices.push(a, c, b, b, c, d);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    geo.setIndex(indices);
    const ground = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, flatShading: true, roughness: 1, metalness: 0 }));
    scene.add(ground);
    const cLow = new THREE.Color(0x6f9a4d), cMid = new THREE.Color(0xb08245), cHigh = new THREE.Color(0x6e4a23), tmpC = new THREE.Color();
    function colorFor(h, out) {
      const t = Math.max(0, Math.min(1, (h - MIN_H) / (MAX_H - MIN_H)));
      if (t < 0.45) out.copy(cLow).lerp(cMid, t / 0.45); else out.copy(cMid).lerp(cHigh, (t - 0.45) / 0.55);
      return out;
    }
    let normalsDone = false;
    function syncGeometry() {
      for (let idx = 0; idx < V * V; idx++) {
        positions[idx * 3] = vx[idx]; positions[idx * 3 + 1] = heights[idx]; positions[idx * 3 + 2] = vz[idx];
        colorFor(heights[idx], tmpC); colors[idx * 3] = tmpC.r; colors[idx * 3 + 1] = tmpC.g; colors[idx * 3 + 2] = tmpC.b;
      }
      geo.attributes.position.needsUpdate = true; geo.attributes.color.needsUpdate = true;
      if (!normalsDone) { geo.computeVertexNormals(); normalsDone = true; }
      geo.computeBoundingSphere();
    }

    // 重機
    const dozer = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf0c020, flatShading: true, roughness: 0.7 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333, flatShading: true, roughness: 0.9 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.9, 2.2), bodyMat); body.position.y = 0.95; dozer.add(body);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.7, 0.9), bodyMat); cabin.position.set(0, 1.6, -0.2); dozer.add(cabin);
    const blade = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.8, 0.25), darkMat); const BLADE_Y = 0.6; blade.position.set(0, BLADE_Y, 1.45); dozer.add(blade);
    const trackL = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.6, 2.4), darkMat); trackL.position.set(-0.8, 0.4, 0); dozer.add(trackL);
    const trackR = trackL.clone(); trackR.position.x = 0.8; dozer.add(trackR);
    scene.add(dozer);

    // 粒子（細かい土ぼこり＋飛ぶ土の塊）の共通プール
    function makeParticles(n, size, color, opacity) {
      const pos = new Float32Array(n * 3), vel = new Float32Array(n * 3), life = new Float32Array(n);
      for (let k = 0; k < n; k++) pos[k * 3 + 1] = -999;
      const g = new THREE.BufferGeometry(); g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      const pts = new THREE.Points(g, new THREE.PointsMaterial({ color, size, transparent: true, opacity, depthWrite: false }));
      scene.add(pts);
      return { pos, vel, life, g, cur: 0, n };
    }
    const dust = makeParticles(90, 0.34, 0xbfa478, 0.85);   // 細かいぼこり（増量）
    const chunk = makeParticles(40, 0.75, 0x8a6234, 0.95);  // 飛ぶ土の塊
    function emit(p, x, y, z, up, spread) {
      const k = p.cur; p.cur = (p.cur + 1) % p.n;
      p.pos[k * 3] = x + (Math.random() - 0.5) * spread;
      p.pos[k * 3 + 1] = y + 0.2;
      p.pos[k * 3 + 2] = z + (Math.random() - 0.5) * spread;
      p.vel[k * 3] = (Math.random() - 0.5) * spread * 2.2;
      p.vel[k * 3 + 1] = up * (0.7 + Math.random() * 0.8);
      p.vel[k * 3 + 2] = (Math.random() - 0.5) * spread * 2.2;
      p.life[k] = 0.45 + Math.random() * 0.4;
    }
    function updateParticles(p, dt, grav) {
      let live = false;
      for (let k = 0; k < p.n; k++) {
        if (p.life[k] > 0) {
          live = true; p.life[k] -= dt; p.vel[k * 3 + 1] -= grav * dt;
          p.pos[k * 3] += p.vel[k * 3] * dt; p.pos[k * 3 + 1] += p.vel[k * 3 + 1] * dt; p.pos[k * 3 + 2] += p.vel[k * 3 + 2] * dt;
          if (p.life[k] <= 0) p.pos[k * 3 + 1] = -999;
        }
      }
      if (live) p.g.attributes.position.needsUpdate = true;
    }
    // 削るエフェクト本体：ぼこり多め＋塊が前方へ飛ぶ＋掘る動き＋揺れ
    let digPulse = 0, bladePhase = 0, lastChunk = 0;
    function digFx(strong) {
      const fx = game.mx + Math.sin(game.myaw) * 1.4, fz = game.mz + Math.cos(game.myaw) * 1.4; // ブレード前方
      const gy = sampleHeight(fx, fz);            // 粒子は地面の高さから出す
      const nDust = strong ? 4 : 2;
      for (let i = 0; i < nDust; i++) emit(dust, fx, gy, fz, 3.0, 1.3);
      if (strong) { const now = performance.now(); if (now - lastChunk > 70) { lastChunk = now; for (let i = 0; i < 2; i++) emit(chunk, fx, gy, fz, 4.2, 0.8); } } // 土の塊は間引いて放出
      digPulse = strong ? 0.16 : 0.10;
      shake = Math.min(strong ? 0.16 : 0.09, shake + (strong ? 0.06 : 0.03));
    }

    // ===================== 入力：左下パッド＋キーボード＝移動 / 画面ドラッグ＝視点 =====================
    const keys = { up: false, down: false, left: false, right: false };
    let acting = false;   // 動作ボタン（押している間だけ 削る/盛る）
    const clearKeys = () => { keys.up = keys.down = keys.left = keys.right = false; acting = false; document.querySelectorAll(".dbtn").forEach((b) => b.classList.remove("on")); const a = document.getElementById("act"); if (a) a.classList.remove("on"); };
    document.querySelectorAll(".dbtn").forEach((b) => {
      const dir = b.getAttribute("data-dir"); const ptrs = new Set();
      const on = (e) => { e.preventDefault(); if (ptrs.size === 0 && b.setPointerCapture) { try { b.setPointerCapture(e.pointerId); } catch (_) {} } ptrs.add(e.pointerId); keys[dir] = true; b.classList.add("on"); hideHint(); };
      const off = (e) => { ptrs.delete(e.pointerId); if (ptrs.size === 0) { keys[dir] = false; b.classList.remove("on"); } };
      b.addEventListener("pointerdown", on);
      b.addEventListener("pointerup", off);
      b.addEventListener("pointercancel", off);
      b.addEventListener("pointerleave", off);
    });
    const KEYMAP = { ArrowUp: "up", KeyW: "up", ArrowDown: "down", KeyS: "down", ArrowLeft: "left", KeyA: "left", ArrowRight: "right", KeyD: "right" };
    window.addEventListener("keydown", (e) => { if (e.code === "Space") { acting = true; const a = document.getElementById("act"); if (a) a.classList.add("on"); e.preventDefault(); hideHint(); return; } const d = KEYMAP[e.code]; if (d) { keys[d] = true; e.preventDefault(); hideHint(); } });
    window.addEventListener("keyup", (e) => { if (e.code === "Space") { acting = false; const a = document.getElementById("act"); if (a) a.classList.remove("on"); return; } const d = KEYMAP[e.code]; if (d) keys[d] = false; });
    window.addEventListener("blur", clearKeys);   // フォーカスが外れたら全方向リセット（押しっぱなし暴走防止）
    window.addEventListener("pagehide", clearKeys);

    // 画面ドラッグ＝視点（カメラ）回転
    const el = renderer.domElement;
    let lookId = null, lookX = 0, lookY = 0;
    el.addEventListener("pointerdown", (e) => { if (lookId !== null) return; lookId = e.pointerId; lookX = e.clientX; lookY = e.clientY; if (el.setPointerCapture) try { el.setPointerCapture(e.pointerId); } catch (_) {} });
    el.addEventListener("pointermove", (e) => {
      if (e.pointerId !== lookId) return; e.preventDefault();
      camYaw -= (e.clientX - lookX) * LOOK_SENS;
      camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, camPitch - (e.clientY - lookY) * LOOK_SENS));
      lookX = e.clientX; lookY = e.clientY;
    });
    const endLook = (e) => { if (e.pointerId === lookId) lookId = null; };
    el.addEventListener("pointerup", endLook);
    el.addEventListener("pointercancel", endLook);
    el.addEventListener("lostpointercapture", endLook);   // キャプチャ喪失でも視点ドラッグを解放
    window.addEventListener("touchmove", (e) => { if (lookId !== null) e.preventDefault(); }, { passive: false });

    let hintTimer = setTimeout(hideHint, 8000);
    function hideHint() { const h = document.getElementById("hint"); if (h) h.style.opacity = "0"; clearTimeout(hintTimer); }

    // ===================== 削る/盛る（体積保存）=====================
    let lastVib = 0, shake = 0;
    function tryVibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
    // 押し均し：押し始めた高さ(cutHeight)へ整地。高い所を削ってブレードに溜め、低い所へ押し出して埋める。土は保存。
    function gradePush(dt) {
      const fx = game.mx + Math.sin(game.myaw) * 1.2, fz = game.mz + Math.cos(game.myaw) * 1.2; // ブレード前方
      let blade = game.blade, cutVol = 0, changed = false;
      for (let idx = 0; idx < V * V; idx++) {
        const dx = vx[idx] - fx, dz = vz[idx] - fz, dist = Math.sqrt(dx * dx + dz * dz);
        if (dist >= DIG_RADIUS) continue;
        const step = DIG_RATE * dt * Math.max(0.4, 1 - dist / DIG_RADIUS), h = heights[idx]; // 端も効くようフェードを底上げ
        if (h > cutHeight + 0.01) {                 // 高い→削ってブレードに溜める
          const cut = Math.min(h - cutHeight, step); if (cut > 0) { heights[idx] = h - cut; blade += cut * CELL_AREA; cutVol += cut * CELL_AREA; changed = true; }
        } else if (h < cutHeight - 0.01 && blade > 0) { // 低い→ブレードの土で押し埋める
          const fill = Math.min(cutHeight - h, step, blade / CELL_AREA); if (fill > 0) { heights[idx] = h + fill; blade -= fill * CELL_AREA; changed = true; }
        }
      }
      game.blade = Math.max(0, blade); game.totalDug += cutVol;
      if (changed) { digFx(true); const now = performance.now(); if (now - lastVib > 110) { lastVib = now; tryVibrate(9); } syncGeometry(); refreshHUD(); checkWin(); }
    }

    // ===================== 重機の移動（視点に対して前後左右）=====================
    function updateDozer(dt) {
      // 視点(camYaw)基準の方向ベクトル
      const F = [-Math.sin(camYaw), -Math.cos(camYaw)];   // 奥(画面の上＝カメラの逆)
      const R = [-F[1], F[0]];                            // 右
      let mxv = 0, mzv = 0;
      if (keys.up) { mxv += F[0]; mzv += F[1]; }
      if (keys.down) { mxv -= F[0]; mzv -= F[1]; }
      if (keys.right) { mxv += R[0]; mzv += R[1]; }
      if (keys.left) { mxv -= R[0]; mzv -= R[1]; }
      let moving = false; const len = Math.sqrt(mxv * mxv + mzv * mzv);
      if (len > 0.0001) {
        mxv /= len; mzv /= len; const step = MOVE_SPEED * dt; const half = WORLD / 2 - 0.5;
        game.mx = Math.max(-half, Math.min(half, game.mx + mxv * step));
        game.mz = Math.max(-half, Math.min(half, game.mz + mzv * step));
        game.myaw = Math.atan2(mxv, mzv); moving = true;
      }
      const gy = sampleHeight(game.mx, game.mz);
      dozer.position.set(game.mx, gy, game.mz); dozer.rotation.y = game.myaw;
      // 押しながら移動した時だけ整地（止まると削れない）。押し始めた高さ(cutHeight)を基準にならす。
      if (acting && moving && !game.won) { if (!pushing) { pushing = true; cutHeight = sampleHeight(game.mx, game.mz); } gradePush(dt); }
      else pushing = false;
      // ブレードの掘る動き
      if (digPulse > 0) { digPulse = Math.max(0, digPulse - dt); bladePhase += dt * 32; blade.position.y = BLADE_Y - 0.18 - Math.sin(bladePhase) * 0.06; blade.rotation.x = Math.sin(bladePhase) * 0.22; }
      else { blade.position.y = BLADE_Y; blade.rotation.x = 0; }
    }
    function sampleHeight(x, z) {
      const i = Math.max(0, Math.min(GRID, Math.round((x / WORLD + 0.5) * GRID)));
      const j = Math.max(0, Math.min(GRID, Math.round((z / WORLD + 0.5) * GRID)));
      return heights[j * V + i];
    }

    // ===================== カメラ（重機を中心に旋回）=====================
    function updateCamera() {
      const aspect = window.innerWidth / Math.max(1, window.innerHeight);
      const f = aspect < 1 ? Math.min(1.9, 1 / aspect) : 1, dist = CAM_DIST * f, horiz = dist * Math.cos(camPitch);
      let sx = 0, sy = 0; if (shake > 0.001) { sx = (Math.random() - 0.5) * shake; sy = (Math.random() - 0.5) * shake; }
      camera.position.set(game.mx + horiz * Math.sin(camYaw) + sx, dist * Math.sin(camPitch) + sy, game.mz + horiz * Math.cos(camYaw));
      camera.lookAt(game.mx, 1, game.mz);
    }

    // ===================== HUD =====================
    const dugEl = document.getElementById("dug"), carryEl = document.getElementById("carry"), barEl = document.querySelector("#bar > i");
    let lastDugFloor = 0;
    function progress() { return 1 - flatness() / game.initialFlat; }
    function refreshHUD() {
      dugEl.textContent = game.totalDug.toFixed(1); carryEl.textContent = game.blade.toFixed(1);
      const fl = Math.floor(game.totalDug);
      if (fl !== lastDugFloor) { lastDugFloor = fl; dugEl.classList.remove("pop"); void dugEl.offsetWidth; dugEl.classList.add("pop"); }
      barEl.style.width = Math.max(0, Math.min(100, progress() * 100)).toFixed(0) + "%";
    }
    function checkWin() {
      if (game.won) return;
      if (progress() >= WIN_AT) { game.won = true; document.getElementById("win-text").textContent = "削った土 " + game.totalDug.toFixed(1) + " m³ ／ 整地おつかれさま！"; document.getElementById("win").classList.add("show"); }
    }

    // ===================== ボタン =====================
    const actBtn = document.getElementById("act");
    // 動作ボタン：押している間だけ整地（マルチタッチ取りこぼし防止に Set 管理）
    (function () {
      const ptrs = new Set();
      const on = (e) => { e.preventDefault(); if (ptrs.size === 0 && actBtn.setPointerCapture) { try { actBtn.setPointerCapture(e.pointerId); } catch (_) {} } ptrs.add(e.pointerId); acting = true; actBtn.classList.add("on"); hideHint(); };
      const off = (e) => { ptrs.delete(e.pointerId); if (ptrs.size === 0) { acting = false; actBtn.classList.remove("on"); } };
      actBtn.addEventListener("pointerdown", on);
      actBtn.addEventListener("pointerup", off);
      actBtn.addEventListener("pointercancel", off);
      actBtn.addEventListener("pointerleave", off);
    })();
    document.getElementById("reset").addEventListener("click", () => { if (window.confirm("最初の地形に戻しますか？\n削った内容は消えます。")) restore(false); });
    document.getElementById("again").addEventListener("click", () => { document.getElementById("win").classList.remove("show"); restore(true); });
    function restore(regen) {
      if (regen) generateTerrain(); else { heights.set(baseHeights); game.initialFlat = Math.max(1, flatness()); }
      game.blade = 0; game.totalDug = 0; game.won = false; pushing = false; lastDugFloor = 0;
      game.mx = 0; game.mz = 6; game.myaw = Math.PI; syncGeometry(); refreshHUD(); save();
    }

    // ===================== 保存 =====================
    const KEY = "doboku_mvp_v5";
    function save() {
      try {
        localStorage.setItem(KEY, JSON.stringify({ g: GRID, h: Array.from(heights), b: Array.from(baseHeights), blade: game.blade, dug: game.totalDug, mx: game.mx, mz: game.mz, myaw: game.myaw, ifl: game.initialFlat, cy: camYaw, cp: camPitch }));
      } catch (e) {}
    }
    function load() {
      try {
        const raw = localStorage.getItem(KEY); if (!raw) return false; const s = JSON.parse(raw);
        if (!s || s.g !== GRID || !s.h || s.h.length !== V * V || !s.b || s.b.length !== V * V) return false;
        heights.set(s.h); baseHeights.set(s.b); game.blade = s.blade || 0; game.totalDug = s.dug || 0;
        game.mx = s.mx || 0; game.mz = s.mz || 6; game.myaw = (s.myaw != null) ? s.myaw : Math.PI; game.initialFlat = Math.max(1, s.ifl || flatness()); game.won = false;
        if (s.cy != null) camYaw = s.cy; if (s.cp != null) camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, s.cp));
        return true;
      } catch (e) { return false; }
    }

    // ===================== リサイズ・ループ =====================
    let lastW = 0, lastH = 0, rotateTimer = 0;
    function resize() {
      const w = window.innerWidth, h = window.innerHeight; if (w === 0 || h === 0) return;
      renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix(); lastW = w; lastH = h;
      const rot = document.getElementById("rotate");
      if (h > w + 40) { rot.classList.add("show"); clearTimeout(rotateTimer); rotateTimer = setTimeout(() => rot.classList.remove("show"), 3500); } else rot.classList.remove("show");
    }
    window.addEventListener("resize", resize); window.addEventListener("orientationchange", resize);

    let last = performance.now(), running = true;
    function loop(now) {
      if (document.hidden) { running = false; return; }
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      if (window.innerWidth !== lastW || window.innerHeight !== lastH) resize();
      updateDozer(dt); updateParticles(dust, dt, 4.5); updateParticles(chunk, dt, 9.0);
      if (shake > 0) shake = Math.max(0, shake - dt * 0.4);
      updateCamera(); renderer.render(scene, camera); requestAnimationFrame(loop);
    }
    document.addEventListener("visibilitychange", () => { if (document.hidden) { clearKeys(); } else if (!running) { running = true; last = performance.now(); requestAnimationFrame(loop); } });

    // ===================== 起動 =====================
    if (!load()) generateTerrain();
    normalsDone = false; syncGeometry(); refreshHUD(); resize(); requestAnimationFrame(loop); setInterval(save, 8000);

    // デバッグ用フック（URLに ?test を付けた時だけ有効・通常は無効）
    if (/[?&]test\b/.test(location.search)) window.__t = { game, keys, updateDozer, updateCamera, flatness, progress, restore, camera, sampleHeight, setYaw: (y) => { camYaw = y; }, getYaw: () => camYaw, setActing: (v) => { acting = v; }, getActing: () => acting, getCut: () => cutHeight, getPushing: () => pushing, terrainStats: () => { let sum = 0, mx = -1e9, mn = 1e9; for (let i = 0; i < V * V; i++) { sum += heights[i]; if (heights[i] > mx) mx = heights[i]; if (heights[i] < mn) mn = heights[i]; } return { sum, mx, mn }; } };
  })();
  </script>
</body>
</html>
