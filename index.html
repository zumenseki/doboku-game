<!DOCTYPE html>
<html lang="ja">
<head>

<title>土木ゲーム</title>
<style>
  :root { --dig:#e07a1c; --fill:#2faa55; --ink:#20303a; --panel:rgba(255,255,255,0.82); --water:#2f7fd6; }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#bfe3f2;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:none; overscroll-behavior:none;
  }
  #app { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }
  #hud-top { position:fixed; top:env(safe-area-inset-top,8px); left:0; right:0; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; pointer-events:none; padding:8px env(safe-area-inset-right,8px) 0 env(safe-area-inset-left,8px); }
  .badge { background:var(--panel); color:var(--ink); border-radius:13px; padding:6px 10px; font-weight:800; font-size:12.5px; box-shadow:0 2px 8px rgba(0,0,0,.15); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .badge small { font-weight:700; opacity:.7; font-size:.72em; }
  #b-work .v { color:var(--fill); }
  #b-main .v { color:var(--water); }
  #total-badge { opacity:.92; } #total-badge .v { color:var(--water); }
  #money-badge .v { color:#b8860b; }
  #blade-badge .v { color:#7a5a2a; } #blade-badge.over { background:#ffd6d6; }
  .badge.done { background:#cdeccd; }
  #garage { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #garage.show { display:flex; animation:fade .3s ease; }
  .g-box { background:#fff; border-radius:16px; padding:16px; width:min(94vw,440px); max-height:84vh; overflow:auto; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .g-box h2 { margin:0 0 10px; font-size:18px; color:var(--ink); }
  .g-maker { font-weight:800; font-size:13px; color:var(--ink); margin:11px 2px 5px; padding-bottom:3px; border-bottom:2px solid #dde4e8; }
  .g-maker:first-child { margin-top:0; }
  .g-maker small { opacity:.6; font-weight:700; font-size:11px; }
  .g-card { display:flex; align-items:center; gap:10px; padding:9px; border-radius:12px; background:#f2f5f7; margin-bottom:8px; }
  .g-card.cur { background:#e2f0e2; box-shadow:inset 0 0 0 2px #9ccf9c; }
  .g-ic { font-size:30px; line-height:1; }
  .g-info { flex:1; color:var(--ink); min-width:0; }
  .g-info b { font-size:14px; } .g-info small { display:block; opacity:.72; font-size:11px; line-height:1.4; }
  .g-btn { border:none; border-radius:10px; padding:9px 12px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; text-align:center; }
  .g-btn small { font-size:10px; opacity:.85; font-weight:700; }
  .g-btn.buy { background:var(--fill); color:#fff; } .g-btn.use { background:var(--water); color:#fff; }
  .g-btn.used { background:#cdeccd; color:var(--ink); } .g-btn.ng { background:#e6e6e6; color:#999; }
  #g-close { margin-top:4px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }
  #shop { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 96px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #machineBtn { position:fixed; left:calc(env(safe-area-inset-left,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 52px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:8px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; display:flex; flex-direction:column; align-items:center; line-height:1.1; }
  #machineBtn span { font-size:9px; opacity:.7; margin-top:1px; }

  #lv-badge { background:rgba(32,48,58,.82); color:#fff; }
  #goal { position:fixed; top:calc(env(safe-area-inset-top,8px) + 50px); right:calc(env(safe-area-inset-right,0px) + 14px); width:min(56vw,300px); background:var(--panel); border-radius:12px; padding:7px 12px; box-shadow:0 2px 8px rgba(0,0,0,.15); pointer-events:none; max-width:calc(100vw - 24px); z-index:3; }   /* [親方FB] 中央上→右上へ移動（プレイ画面の中央を塞がない） */
  #goal .label { font-size:12px; font-weight:700; color:var(--ink); opacity:.85; margin-bottom:4px; line-height:1.45; }
  #bar { display:none; }   /* [親方FB] 中央の進捗バーは非表示（進捗はバッジの%で表示） */
  #bar > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#7db5ec,#2f7fd6); transition:width .2s ease; }
  #dpad { position:fixed; left:calc(env(safe-area-inset-left,0px) + 16px); bottom:calc(env(safe-area-inset-bottom,0px) + 18px); display:grid; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,56px); gap:6px; z-index:4; }
  .dbtn { border:none; border-radius:14px; background:var(--panel); color:var(--ink); font-size:24px; font-weight:900; box-shadow:0 3px 10px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; touch-action:none; }

  #act { position:fixed; right:calc(env(safe-area-inset-right,0px) + 18px); bottom:calc(env(safe-area-inset-bottom,0px) + 22px); width:96px; height:96px; border-radius:50%; border:none; color:#fff; font-weight:900; font-size:21px; background:var(--dig); box-shadow:0 6px 16px rgba(0,0,0,.28); cursor:pointer; line-height:1.1; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center; touch-action:none; }

  /* [即効パック] 操作ボタンの凡例（前進/後退/左/右の小キャプション）＝初見が「指3種」を理解できる */
  .dbtn { flex-direction:column; gap:0; }
  .dbtn small { font-size:8.5px; font-weight:800; opacity:.6; line-height:1; letter-spacing:0; margin-top:0; }

  @keyframes hintPulse { 0%,100%{ box-shadow:0 3px 10px rgba(0,0,0,.2); } 50%{ box-shadow:0 0 0 5px rgba(47,127,214,.55), 0 3px 10px rgba(0,0,0,.25); } }
  body.intro .dbtn, body.intro #act { animation: hintPulse 1.15s ease-in-out 4; }
  #menuBtn.pulse { animation: hintPulse 1.2s ease-in-out infinite; }
  body.need-shop #shop { display:block; animation: hintPulse 1.3s ease-in-out infinite; }
  /* [即効パック] クリア演出：星のポップ＋満杯バッジのパルス */
  #win-stars .wstar { display:inline-block; }
  #win-stars .wstar.pop { animation: starPop .5s cubic-bezier(.2,1.5,.4,1) both; }
  @keyframes starPop { 0%{ transform:scale(0); opacity:0; } 60%{ transform:scale(1.3); } 100%{ transform:scale(1); opacity:1; } }
  @keyframes badgePulse { 0%{ transform:scale(1); } 35%{ transform:scale(1.3); } 100%{ transform:scale(1); } }
  #blade-badge.pulse { animation: badgePulse .36s ease; }
  /* [batch3] 工程チェックリスト（お題の下に☐→☑で今どこか見せる） */
  #goal-steps { margin-top:5px; display:flex; flex-wrap:wrap; align-items:center; gap:3px; font-size:11px; font-weight:800; line-height:1.3; }
  #goal-steps .stp { color:var(--ink); opacity:.55; }
  #goal-steps .stp.done { color:var(--fill); opacity:1; }
  #goal-steps .stp-arrow { opacity:.4; margin:0 1px; }
  /* [batch3] 総★メーター（マップ選択の見出し下） */
  #star-total { text-align:center; font-size:13px; font-weight:800; color:#8a6d1a; margin:-2px 0 10px; }
  #star-total b { color:#f5c518; }
  #reset { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 56px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:10px 13px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #reset:active { transform:scale(.95); }
  #hint { position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:rgba(0,0,0,.55); color:#fff; padding:9px 16px; border-radius:18px; font-weight:700; font-size:13px; pointer-events:none; transition:opacity .5s ease; text-align:center; max-width:86vw; line-height:1.6; }
  #win { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; background:rgba(10,30,40,.55); color:#fff; text-align:center; z-index:8; gap:14px; }
  #win.show { display:flex; animation:fade .4s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #win h1 { font-size:42px; margin:0; text-shadow:0 3px 16px rgba(0,0,0,.5); }
  #win-stars { font-size:40px; letter-spacing:6px; color:#f5c518; text-shadow:0 2px 10px rgba(0,0,0,.45); }
  #win p { margin:0; font-size:17px; font-weight:700; }
  .m-stars { color:#f5c518; font-size:13px; letter-spacing:1px; margin-left:4px; }
  #again { margin-top:6px; background:var(--water); color:#fff; border:none; border-radius:14px; padding:14px 30px; font-weight:900; font-size:18px; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,.3); }
  /* [親方FB] スマホ縦持ち時は全画面オーバーレイで横向きを促す（横にすると自動で消える＝実質強制） */
  #rotate { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; text-align:center; background:rgba(8,22,30,.97); color:#fff; font-weight:800; font-size:20px; line-height:1.7; padding:28px; z-index:60; }
  #rotate.show { display:flex; animation:fade .3s ease; }
  #rotate .rot-ic { font-size:64px; animation:rotwig 1.6s ease-in-out infinite; }
  #rotate .rot-sub { font-size:13px; font-weight:700; opacity:.8; }
  @keyframes rotwig { 0%,100%{ transform:rotate(-12deg); } 50%{ transform:rotate(78deg); } }
  #mute { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 136px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:16px; line-height:1; }
  #achBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 176px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #mute:active, #achBtn:active { transform:scale(.95); } #mute.off { opacity:.55; }
  #mapBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 216px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #mapBtn:active { transform:scale(.95); }
  /* [親方FB] 右側ボタン(最初から/ショップ/音/実績/マップ)は☰メニューで開閉。普段は隠す＝画面スッキリ */
  #menuBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 12px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 13px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:5; font-size:16px; line-height:1; }
  #menuBtn:active { transform:scale(.95); }
  #reset, #shop, #mute, #achBtn, #mapBtn { display:none; }
  body.menu-open #reset, body.menu-open #shop, body.menu-open #mute, body.menu-open #achBtn, body.menu-open #mapBtn { display:block; }
  #mapsel { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #mapsel.show { display:flex; animation:fade .3s ease; }
  .m-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
  .m-card { display:flex; align-items:center; gap:9px; padding:9px; border-radius:12px; background:#f2f5f7; cursor:pointer; }
  .m-card.cur { background:#e2f0e2; box-shadow:inset 0 0 0 2px #9ccf9c; }
  .m-card.locked { opacity:.5; cursor:default; }
  .m-card .m-ic { font-size:20px; flex:0 0 auto; }
  .m-card .m-tx { line-height:1.25; font-size:13px; } .m-card .m-tx small { display:block; color:#667; font-size:11px; margin-top:2px; }
  /* [親方FB] 重機切替リスト（取得済みから選ぶ） */
  #mchooser { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #mchooser.show { display:flex; animation:fade .3s ease; }
  #mc-close { margin-top:10px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }
  .mc-tag { display:inline-block; margin-top:3px; font-size:10px; font-weight:800; padding:1px 7px; border-radius:8px; background:#dde6ec; color:#456; }

  .mc-tag.field { background:#cfe6f6; color:#114; }

  #mc-note.show { display:block; }
  #mc-list { display:flex; flex-direction:column; gap:6px; }   /* [親方FB] 1台ごと＝1列で並べる（ボタンが入る幅を確保） */
  .mc-group { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:800; color:var(--ink); margin:8px 0 0; }   /* [親方FB] 種類ごとの見出し（×N台で一目） */

  .mc-onfield { font-size:10px; font-weight:800; color:#114; background:#cfe6f6; padding:1px 7px; border-radius:8px; }
  .mc-unit { margin-left:10px; }   /* 見出しの下にぶら下がる感じで少しインデント */
  .mc-lv { display:inline-block; margin-left:6px; font-size:10px; font-weight:800; padding:1px 7px; border-radius:8px; background:#fde8c4; color:#8a5a10; }
  .g-btn.recall { background:#e0795a; color:#fff; }
  .g-btn.auto { background:#e0a020; color:#fff; } .g-btn.auto.on { background:#2c8a2c; }   /* [batch4] 監督モード 作業ON=緑 */
  #mc-recall-all { display:none; width:100%; margin-bottom:10px; background:#e0795a; color:#fff; border:none; border-radius:12px; padding:11px; font-weight:800; font-size:14px; cursor:pointer; }

  .g-btns { display:flex; flex-direction:column; gap:4px; align-items:stretch; }
  .g-btn.upg { background:#e89a2a; color:#fff; } .g-btn.maxed { background:#f0d8a0; color:#7a5a10; }

  .mc-col { flex:1 1 0; min-width:0; }
  .mc-col-h { font-size:13px; font-weight:800; text-align:center; padding:6px 4px; border-radius:10px; margin-bottom:8px; }
  .mc-col-standby { background:#e6edf2; color:#456; }
  .mc-col-field { background:#cfe6f6; color:#114; }
  .mc-empty { font-size:12px; color:#8aa; text-align:center; padding:18px 6px; }
  #tchooser { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #tchooser.show { display:flex; animation:fade .3s ease; }
  #tc-list { display:flex; flex-direction:column; gap:6px; }
  #tc-close { margin-top:10px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }

  #tc-recall-all:active { transform:scale(.97); }
  #truckBtn { position:fixed; left:calc(env(safe-area-inset-left,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 104px); background:#dbeaf6; color:var(--ink); border:none; border-radius:12px; padding:8px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; display:flex; flex-direction:column; align-items:center; line-height:1.1; }
  #truckBtn span { font-size:9px; opacity:.7; margin-top:1px; }
  #truckBtn:active { transform:scale(.95); }
  #badges { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #badges.show { display:flex; animation:fade .3s ease; }
  .b-box { background:#fff; border-radius:16px; padding:16px; width:min(94vw,440px); max-height:84vh; overflow:auto; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .b-box h2 { margin:0 0 10px; font-size:18px; color:var(--ink); }
  #b-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }

  .b-item .b-ic { font-size:30px; line-height:1.2; } .b-item b { display:block; font-size:13px; margin-top:2px; } .b-item small { display:block; font-size:10px; opacity:.7; line-height:1.3; }
  #b-close { margin-top:10px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }
  #achToast { position:fixed; left:50%; top:calc(env(safe-area-inset-top,8px) + 150px); transform:translateX(-50%); background:rgba(184,134,11,.96); color:#fff; padding:10px 18px; border-radius:18px; font-weight:800; font-size:14px; box-shadow:0 4px 14px rgba(0,0,0,.3); opacity:0; transition:opacity .4s ease; pointer-events:none; z-index:7; text-align:center; white-space:nowrap; }
  #achToast.show { opacity:1; }
  /* [親方FB] 購入成功バナー（中央にポンと一瞬） */
  #buyToast { position:fixed; left:50%; top:42%; transform:translate(-50%,-50%) scale(.85); background:rgba(44,122,44,.97); color:#fff; padding:14px 26px; border-radius:18px; font-weight:900; font-size:18px; box-shadow:0 6px 22px rgba(0,0,0,.35); opacity:0; pointer-events:none; z-index:10; text-align:center; white-space:nowrap; transition:opacity .22s ease, transform .22s ease; }
  #buyToast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

    const KOKI_FLOOR = 0.5;       // 超過時の報酬下限（基本Rに対する割合）

    for (let j = 0; j < V; j++) for (let i = 0; i < V; i++) { const idx = j * V + i; vx[idx] = (i / GRID - 0.5) * WORLD; vz[idx] = (j / GRID - 0.5) * WORLD; }
    function gauss(x, z, cx, cz, h, s) { const d2 = (x - cx) * (x - cx) + (z - cz) * (z - cz); return h * Math.exp(-d2 / (2 * s * s)); }
    function rnd2(k) { return (Math.random() - 0.5) * k; }
    function rect(i0, i1, j0, j1) { return { i0: i0, i1: i1, j0: j0, j1: j1 }; }
    function inRect(i, j, z) { return i >= z.i0 && i <= z.i1 && j >= z.j0 && j <= z.j1; }
    function worldX(i) { return (i / GRID - 0.5) * WORLD; }
    function worldZ(j) { return (j / GRID - 0.5) * WORLD; }
    function clamp(h) { return h < MIN_H ? MIN_H : (h > MAX_H ? MAX_H : h); }
    function clearWater() { waterD.fill(0); fL.fill(0); fR.fill(0); fT.fill(0); fB.fill(0); }

    // ===================== ゾーン計測（汎用） =====================
    function zoneEach(z, cb) { for (let j = z.j0; j <= z.j1; j++) for (let i = z.i0; i <= z.i1; i++) cb(j * V + i); }
    function zoneVol(z) { let s = 0; zoneEach(z, (idx) => { s += waterD[idx]; }); return s * CELL_AREA; }
    function zoneMean(z) { let m = 0, n = 0; zoneEach(z, (idx) => { m += heights[idx]; n++; }); return n ? m / n : 0; }
    function zoneMaxDev(z) { const mean = zoneMean(z); let m = 0; zoneEach(z, (idx) => { const d = Math.abs(heights[idx] - mean); if (d > m) m = d; }); return m; }
    function zoneFlatness(z) { const mean = zoneMean(z); let s = 0; zoneEach(z, (idx) => { const d = Math.abs(heights[idx] - mean); if (d > FLAT_TOL) { const e = d - FLAT_TOL; s += e * e * CELL_AREA; } }); return s; }
    function zoneExcessAbove(arr, z, thr) { let s = 0; zoneEach(z, (idx) => { const e = arr[idx] - thr; if (e > 0) s += e * CELL_AREA; }); return s; }   // 掘り取り[LV5]：閾値より上に残っている土の量（=残っている山）。穴(閾値以下)は数えない＝バックホウ向き。
    function zoneDeficitBelow(arr, z, thr) { let s = 0; zoneEach(z, (idx) => { const e = thr - arr[idx]; if (e > 0) s += e * CELL_AREA; }); return s; }   // 埋立[L6]：閾値より下に足りない土の量（=埋めるべき窪み）。盛り上がり(閾値以上)は数えない。
    function zoneToTarget(arr, z, target) { let work = 0, mx = 0; zoneEach(z, (idx) => { const d = Math.abs(arr[idx] - target); if (d > mx) mx = d; const e = d - FLAT_TOL; if (e > 0) work += e * CELL_AREA; }); return { work: work, maxDev: mx }; }   // 整地[L7/L8/L10]：目標高さから FLAT_TOL 超ぶんのズレ土量(=残る土工量)と最大ズレ
    function totalWater() { let s = 0; for (let idx = 0; idx < N; idx++) s += waterD[idx]; return s * CELL_AREA; }

    // ===================== レベル地形生成 =====================
    function genDrain(L) { // L0 / L3: 調整池（作業場を排水+整地, ため池に貯水）
      clearWater();
      const A = L.A, B = L.B, bcx = worldX((B.i0 + B.i1) / 2), bcz = worldZ((B.j0 + B.j1) / 2), sc = L.bumpScale;
      const bumps = [
        { x: -3.5 + rnd2(2), z: 5.5 + rnd2(1.5), h: 1.3 * sc, s: 1.2 },
        { x: 3.0 + rnd2(2), z: 7.5 + rnd2(1.5), h: 1.2 * sc, s: 1.2 },
        { x: -1.0 + rnd2(2), z: 9.0 + rnd2(1.5), h: 1.1 * sc, s: 1.1 },
        { x: 3.5 + rnd2(2), z: 4.5 + rnd2(1.5), h: 1.0 * sc, s: 1.1 }
      ];
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx], i = idx % V, j = (idx / V) | 0;
        let h = rnd2(0.1);
        h -= gauss(x, z, bcx, bcz, 3.4, 2.6);   // ため池の深い穴
        h += gauss(x, z, 0, 0, 1.2, 2.2);        // 土手
        if (inRect(i, j, A)) { const t = (j - A.j0) / (A.j1 - A.j0); h = -0.7 + 0.4 * t + rnd2(0.08); for (let b = 0; b < bumps.length; b++) h += gauss(x, z, bumps[b].x, bumps[b].z, bumps[b].h, bumps[b].s); }
        heights[idx] = clamp(h);
      }
      zoneEach(A, (idx) => { const d = L.wl - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genFlow(L) { // L1: 通水（奥の水を尾根を掘って手前へ流す）
      clearWater();
      const S = L.S, D = L.B, scz = worldZ((S.j0 + S.j1) / 2), dcz = worldZ((D.j0 + D.j1) / 2);
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx];
        let h = rnd2(0.1);
        h -= gauss(x, z, 0, scz, 1.6, 3.0);   // 奥の水たまり（上流）
        h += gauss(x, z, 0, 0, 2.0, 1.8);      // 中央の尾根（掘る対象）
        h -= gauss(x, z, 0, dcz, 2.6, 3.0);    // 手前の窪み（下流・より深い）
        heights[idx] = clamp(h);
      }
      zoneEach(S, (idx) => { const d = -0.1 - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genDam(L) { // L2: ため池づくり（盛土で堤防+水路で引き込み）
      clearWater();
      const S = L.S, P = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.1);
        if (i < 10 || i > 26) h = 0.7 + rnd2(0.1);        // 左右の壁（水路を挟む）
        else if (j >= S.j0 && j <= S.j1) h = -1.5 + rnd2(0.1); // 奥の水たまり（水源）
        else if (j >= 10 && j <= 14) h = 0.8 + rnd2(0.1);  // 水源とため池の間の土手（掘る）
        else if (j >= P.j0 && j <= P.j1) h = -0.8 + rnd2(0.1); // ため池の底（浅い窪み）
        else if (j >= 27 && j <= 28) h = -0.6 + rnd2(0.05);  // すき間（堤防で盛る対象＝ここから漏れる）
        else if (j >= 29) h = -2.5 + rnd2(0.1);            // 手前の落ち先（漏れた水が溜まる）
        else h = rnd2(0.1);
        heights[idx] = clamp(h);
      }
      zoneEach(S, (idx) => { const d = -0.1 - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genSub(L) { // L5: 水中工事（水没した底の土の山を水中バックホウで掘り下げて平らに）
      clearWater();
      const A = L.A, m1 = L.m1, m2 = L.m2;
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx], i = idx % V, j = (idx / V) | 0;
        let h = rnd2(0.1);
        if (inRect(i, j, A)) { h = -1.8 + rnd2(0.1); h += gauss(x, z, m1[0], m1[1], 0.9, 1.7) + gauss(x, z, m2[0], m2[1], 0.8, 1.6); } // 深い底＋水中の山
        heights[idx] = clamp(h);
      }
      zoneEach(A, (idx) => { const d = 0.0 - heights[idx]; if (d > 0) waterD[idx] = d; }); // 水面0=深い水(普通のブルは入れない)
    }
    function genHaul(L) { // L6: 大規模造成（左奥の山を掘る→トラックで運ぶ→右手前の窪地を埋める・大マップ108）
      clearWater();
      const hills = [ { x: -18, z: 16, h: 2.4, s: 4.6 }, { x: -11, z: 23, h: 2.1, s: 4.3 }, { x: -24, z: 9, h: 1.9, s: 4.0 }, { x: -15, z: 8, h: 1.7, s: 3.8 } ];
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx];
        let h = rnd2(0.12);                                   // ほぼ平地（地盤0）
        for (let k = 0; k < hills.length; k++) h += gauss(x, z, hills[k].x, hills[k].z, hills[k].h, hills[k].s);  // 左奥の山クラスタ（掘る対象）
        h -= gauss(x, z, 18, -15, 2.7, 7.8);                  // 右手前の広い窪地（埋める対象）
        heights[idx] = clamp(h);
      }
    }
    function genRoad(L) { // L7: 道路をつくる（脇の山から土を取り、横断する道を盛土で目標高さに・大マップ108）
      clearWater();
      const borrow = [ { x: -22, z: -18, h: 3.0, s: 5.0 }, { x: 22, z: 18, h: 2.8, s: 5.2 }, { x: -18, z: 24, h: 2.4, s: 4.4 } ];
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx];
        let h = rnd2(0.1);                                    // ほぼ平地（道はまだ地盤0＝これを盛り上げる）
        for (let k = 0; k < borrow.length; k++) h += gauss(x, z, borrow[k].x, borrow[k].z, borrow[k].h, borrow[k].s);  // 脇の借土山（掘って道へ運ぶ）
        heights[idx] = clamp(h);
      }
    }
    function genPlat(L) { // L8: 宅地造成（傾いた広い土地を削り盛りして一枚の平地に・大マップ108）
      clearWater();
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx];
        let h = (x + z) * 0.05 + rnd2(0.15);                  // 対角に±約3.6mの傾斜（高い側を削り低い側へ盛る＝目標0）
        heights[idx] = clamp(h);
      }
    }
    function genDamBig(L) { // L9: ダム建設（盛土で堤防を作り、水路を掘って貯水池に貯める・大マップ108＝L2の拡大版）
      clearWater();
      const S = L.S, P = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.1);
        if (i < 30 || i > 78) h = 0.7 + rnd2(0.1);            // 左右の壁（水路を挟む）
        else if (j >= S.j0 && j <= S.j1) h = -1.5 + rnd2(0.1); // 奥の水源（上流・j9-27）
        else if (j >= 28 && j <= 44) h = 0.8 + rnd2(0.1);      // 水源と貯水池の間の土手（掘って水路・j28-44で連続）
        else if (j >= P.j0 && j <= P.j1) h = -0.8 + rnd2(0.1); // 貯水池の底（浅い窪み・j45-78）
        else if (j >= 79 && j <= 86) h = -0.95 + rnd2(0.04);   // すき間（堤防で盛る対象＝貯水池の底-0.8より低い→堤防なしだと水は全部ここから漏れて貯まらない＝堤防が必須）
        else if (j >= 87) h = -2.5 + rnd2(0.1);               // 手前の落ち先（漏れた水が溜まる）
        else h = rnd2(0.1);                                   // 手前の平地（j0-8）
        heights[idx] = clamp(h);
      }
      zoneEach(S, (idx) => { const d = -0.1 - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genQuarry(L) { // L10: 大採掘（広い範囲を目標の深さまで掘り下げ、出た土をトラックで運び出す・大マップ108）
      clearWater();
      for (let idx = 0; idx < N; idx++) {
        let h = 0.5 + rnd2(0.12);                             // ほぼ平地（地盤+0.5）＝採掘場を掘り下げる
        heights[idx] = clamp(h);
      }
    }
    function genQuarryRock(L) { // L16 採石場：中央の硬い岩山(A)を掘り崩して撤去（小マップ36・岩=パワー依存メカの見せ場）。硬さはsetHardness(hardZone)で別途付与
      clearWater();
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx];
        const h = rnd2(0.1) + gauss(x, z, 0, 0, 3.0, 4.6);   // 中央の岩山（撤去対象）。周りはほぼ平地
        heights[idx] = clamp(h);
      }
    }
    function genRiverFix(L) { // L17 河川改修：雨で増え続ける氾濫原(A・手前)の水を、中央の堤を掘って河道(B・奥/低い)へ流す（小マップ36・天候=雨メカの見せ場）
      clearWater();
      const A = L.A, B = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.1);
        if (i < 6 || i > 30) h = 1.1 + rnd2(0.1);              // 両岸の高い土手
        else if (inRect(i, j, A)) h = -0.5 + rnd2(0.08);       // 氾濫原（低い・浸水する）
        else if (j >= 17 && j <= 22) h = 1.3 + rnd2(0.1);      // 中央の堤（掘って排水路＝通水する対象）
        else if (inRect(i, j, B)) h = -1.5 + rnd2(0.1);        // 河道（排水先・より低い）
        else h = 0.3 + rnd2(0.1);                              // その他の平地
        heights[idx] = clamp(h);
      }
      zoneEach(A, (idx) => { const d = L.wl - heights[idx]; if (d > 0) waterD[idx] = d; });   // 初期の浸水（氾濫原を水位wlまで満たす）
    }
    function genTunnel(L) { // L18 トンネル掘削：横断する硬い岩の尾根に、通路A(縦の帯)を掘り抜く（小マップ36・岩メカ）
      clearWater();
      for (let idx = 0; idx < N; idx++) {
        const j = (idx / V) | 0; let h = rnd2(0.1);
        if (j >= 12 && j <= 24) h = 3.0 + rnd2(0.15);   // 岩の尾根（横断する高い岩壁）
        else h = 0.2 + rnd2(0.1);                       // 尾根の手前/奥の平地
        heights[idx] = clamp(h);
      }
    }
    function genReclaim(L) { // L19 埋立造成：左の借土山(A)を掘り、右の海の入江(B)を埋め立てて陸地にする（小マップ36）
      clearWater();
      const A = L.A, B = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.1);
        if (inRect(i, j, A)) h = 3.0 + rnd2(0.15);       // 借土の山（掘る）
        else if (inRect(i, j, B)) h = -1.6 + rnd2(0.1);  // 海の入江（埋める・水中）
        else h = 0.3 + rnd2(0.1);                        // 中間の陸
        heights[idx] = clamp(h);
      }
      for (let idx = 0; idx < N; idx++) { const d = -0.2 - heights[idx]; if (d > 0) waterD[idx] = d; }   // 海面-0.2まで（入江に海水）
    }
    function genFloodControl(L) { // L20 大規模治水：大雨で氾濫した広大な低地(A)を、中央の大堤を掘って大型調整池(B)へ排水（大マップ108・天候=雨・集大成）
      clearWater();
      const A = L.A, B = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.12);
        if (i < 8 || i > 100) h = 1.4 + rnd2(0.12);       // 両端の高い堤防
        else if (inRect(i, j, A)) h = -0.5 + rnd2(0.1);   // 氾濫した広い低地（浸水）
        else if (j >= 50 && j <= 62) h = 1.5 + rnd2(0.12); // 中央の大堤（掘って排水路）
        else if (inRect(i, j, B)) h = -1.8 + rnd2(0.12);  // 大型調整池（排水先・深い）
        else h = 0.3 + rnd2(0.1);
        heights[idx] = clamp(h);
      }
      zoneEach(A, (idx) => { const d = L.wl - heights[idx]; if (d > 0) waterD[idx] = d; });   // 初期浸水
    }

    // ===================== レベル定義 =====================
    // ===== L11〜15 専用ジェネレータ（防災・緊急復旧テーマ＋工期制。既存genXxxとは別関数）=====
    function genFloodStop(L) { // L11 氾濫を止める：増水した川(奥)の決壊口を盛土でふさぎつつ、土手を掘って遊水地(B)へ通水（小マップ36）
      clearWater();
      const S = L.S, P = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h;
        if (i < 10 || i > 26) h = 1.0 + rnd2(0.12);                                  // 両岸の高い堤防（高め＝氾濫の演出）
        else if (j >= S.j0 && j <= S.j1) h = -1.5 + rnd2(0.1);                       // 増水した川（水源）
        else if (j >= 10 && j <= 14) h = 0.8 + rnd2(0.1);                            // 川と遊水地の間の土手（掘って通水）
        else if (j >= P.j0 && j <= P.j1) h = -0.8 + rnd2(0.1);                       // 遊水地の底
        else if (j >= 27 && j <= 28) h = -0.6 + rnd2(0.05);                          // 決壊口（盛土でせき止める）
        else if (j >= 29) h = -2.6 + rnd2(0.12);                                     // 街側の低地（漏れると浸水）
        else h = rnd2(0.1);
        heights[idx] = clamp(h);
      }
      zoneEach(S, (idx) => { const d = -0.1 - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genDamRepair(L) { // L12 ダム修復：中央が決壊したダム堤体を盛土で修復し、水源から土手を掘って貯水池(B)へ（大マップ108）
      clearWater();
      const S = L.S, P = L.B;
      for (let idx = 0; idx < N; idx++) {
        const i = idx % V, j = (idx / V) | 0; let h = rnd2(0.1);
        if (i < 30 || i > 78) h = 0.9 + rnd2(0.12);                                  // 左右の岩壁
        else if (j >= S.j0 && j <= S.j1) h = -1.5 + rnd2(0.1);                       // 水源（上流）
        else if (j >= 28 && j <= 44) h = 0.85 + rnd2(0.1);                           // 上流とダム湖の間の土手（掘って通水）
        else if (j >= P.j0 && j <= P.j1) h = -0.85 + rnd2(0.1);                      // ダム湖の底
        else if (j >= 79 && j <= 86) { const mid = Math.abs(i - 54); h = (mid < 9) ? (-0.95 + rnd2(0.05)) : (1.25 + rnd2(0.1)); }  // ダム堤体：中央9マスが決壊(低=修復対象)・両側は高い堤体
        else if (j >= 87) h = -2.6 + rnd2(0.12);                                     // 下流（漏れた水の落ち先）
        else h = rnd2(0.1);
        heights[idx] = clamp(h);
      }
      zoneEach(S, (idx) => { const d = -0.1 - heights[idx]; if (d > 0) waterD[idx] = d; });
    }
    function genSeawall(L) { // L13 護岸強化：手前=海(水)+砂浜、内陸=借土山。護岸ライン(A)を目標高さまで盛る（大マップ108）
      clearWater();
      const borrow = [ { x: -20, z: 22, h: 3.4, s: 5.2 }, { x: 22, z: 20, h: 3.2, s: 5.4 }, { x: 0, z: 26, h: 2.8, s: 4.8 } ];   // 内陸の借土山（掘って護岸へ運ぶ）
      for (let idx = 0; idx < N; idx++) {
        const x = vx[idx], z = vz[idx], j = (idx / V) | 0;
        let h = rnd2(0.1);
        for (let k = 0; k < borrow.length; k++) h += gauss(x, z, borrow[k].x, borrow[k].z, borrow[k].h, borrow[k].s);  // 内陸の土山
        if (j < 4) h = -1.6 + rnd2(0.1);              // 手前＝海（深い）
        else if (j < 10) h = -1.6 + (j - 3) * 0.27 + rnd2(0.08);  // 砂浜＝海から護岸ラインへ上る斜面
        heights[idx] = clamp(h);
      }
      for (let idx = 0; idx < N; idx++) { const d = -0.3 - heights[idx]; if (d > 0) waterD[idx] = d; }   // 海（手前の低い所）に水を満たす
    }
    function genUrbanFlood(L) { // L14 緊急排水：浸水した市街地(A・碁盤目の街区)を排水＆整地し、抜いた水を調整池(B)へ（小マップ36）
      clearWater();
