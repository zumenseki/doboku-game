<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>土木ゲーム 水の試作（4レベル）</title>
<style>
  :root { --dig:#e07a1c; --fill:#2faa55; --ink:#20303a; --panel:rgba(255,255,255,0.82); --water:#2f7fd6; }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#bfe3f2;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:none; overscroll-behavior:none;
  }
  #app { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }
  #hud-top { position:fixed; top:env(safe-area-inset-top,8px); left:0; right:0; display:flex; justify-content:center; gap:8px; flex-wrap:wrap; pointer-events:none; padding:8px env(safe-area-inset-right,8px) 0 env(safe-area-inset-left,8px); }
  .badge { background:var(--panel); color:var(--ink); border-radius:14px; padding:7px 13px; font-weight:800; box-shadow:0 2px 8px rgba(0,0,0,.15); font-variant-numeric:tabular-nums; }
  .badge small { font-weight:700; opacity:.7; font-size:.72em; }
  #b-work .v { color:var(--fill); }
  #b-main .v { color:var(--water); }
  #total-badge { opacity:.92; } #total-badge .v { color:var(--water); }
  #money-badge .v { color:#b8860b; }
  #blade-badge .v { color:#7a5a2a; } #blade-badge.over { background:#ffd6d6; }
  .badge.done { background:#cdeccd; }
  #garage { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #garage.show { display:flex; animation:fade .3s ease; }
  .g-box { background:#fff; border-radius:16px; padding:16px; width:min(94vw,440px); max-height:84vh; overflow:auto; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .g-box h2 { margin:0 0 10px; font-size:18px; color:var(--ink); }
  .g-maker { font-weight:800; font-size:13px; color:var(--ink); margin:11px 2px 5px; padding-bottom:3px; border-bottom:2px solid #dde4e8; }
  .g-maker:first-child { margin-top:0; }
  .g-maker small { opacity:.6; font-weight:700; font-size:11px; }
  .g-card { display:flex; align-items:center; gap:10px; padding:9px; border-radius:12px; background:#f2f5f7; margin-bottom:8px; }
  .g-card.cur { background:#e2f0e2; box-shadow:inset 0 0 0 2px #9ccf9c; }
  .g-ic { font-size:30px; line-height:1; }
  .g-info { flex:1; color:var(--ink); min-width:0; }
  .g-info b { font-size:14px; } .g-info small { display:block; opacity:.72; font-size:11px; line-height:1.4; }
  .g-btn { border:none; border-radius:10px; padding:9px 12px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; text-align:center; }
  .g-btn small { font-size:10px; opacity:.85; font-weight:700; }
  .g-btn.buy { background:var(--fill); color:#fff; } .g-btn.use { background:var(--water); color:#fff; }
  .g-btn.used { background:#cdeccd; color:var(--ink); } .g-btn.ng { background:#e6e6e6; color:#999; }
  #g-close { margin-top:4px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }
  #shop { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 52px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #machineBtn { position:fixed; left:calc(env(safe-area-inset-left,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 52px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:8px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; display:flex; flex-direction:column; align-items:center; line-height:1.1; }
  #truckBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 24px); bottom:calc(env(safe-area-inset-bottom,0px) + 128px); background:#caa14a; color:#3a2c0a; border:none; border-radius:14px; padding:11px 14px; font-weight:800; box-shadow:0 4px 12px rgba(0,0,0,.25); cursor:pointer; z-index:4; font-size:14px; }
  #machineBtn span { font-size:9px; opacity:.7; margin-top:1px; }
  #machineBtn.sub { background:#cfe6f6; }
  #shop:active, #machineBtn:active { transform:scale(.95); }
  #lv-badge { background:rgba(32,48,58,.82); color:#fff; }
  #goal { position:fixed; top:calc(env(safe-area-inset-top,8px) + 52px); left:50%; transform:translateX(-50%); width:min(82vw,380px); background:var(--panel); border-radius:12px; padding:7px 12px; box-shadow:0 2px 8px rgba(0,0,0,.15); pointer-events:none; max-width:calc(100vw - 24px); }
  #goal .label { font-size:12px; font-weight:700; color:var(--ink); opacity:.85; margin-bottom:4px; line-height:1.45; }
  #bar { height:9px; background:#d6dee2; border-radius:6px; overflow:hidden; }
  #bar > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#7db5ec,#2f7fd6); transition:width .2s ease; }
  #dpad { position:fixed; left:calc(env(safe-area-inset-left,0px) + 16px); bottom:calc(env(safe-area-inset-bottom,0px) + 18px); display:grid; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,56px); gap:6px; z-index:4; }
  .dbtn { border:none; border-radius:14px; background:var(--panel); color:var(--ink); font-size:24px; font-weight:900; box-shadow:0 3px 10px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; touch-action:none; }
  .dbtn:active, .dbtn.on { background:#cfe0ea; transform:scale(.94); }
  #d-up { grid-area:1/2/2/3; } #d-left { grid-area:2/1/3/2; } #d-right { grid-area:2/3/3/4; } #d-down { grid-area:3/2/4/3; }
  #act { position:fixed; right:calc(env(safe-area-inset-right,0px) + 18px); bottom:calc(env(safe-area-inset-bottom,0px) + 22px); width:96px; height:96px; border-radius:50%; border:none; color:#fff; font-weight:900; font-size:21px; background:var(--dig); box-shadow:0 6px 16px rgba(0,0,0,.28); cursor:pointer; line-height:1.1; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center; touch-action:none; }
  #act span { font-size:11px; font-weight:700; opacity:.9; }
  #act.on { transform:scale(.93); filter:brightness(1.12); }
  #reset { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 12px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:10px 13px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #reset:active { transform:scale(.95); }
  #hint { position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:rgba(0,0,0,.55); color:#fff; padding:9px 16px; border-radius:18px; font-weight:700; font-size:13px; pointer-events:none; transition:opacity .5s ease; text-align:center; max-width:86vw; line-height:1.6; }
  #win { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; background:rgba(10,30,40,.55); color:#fff; text-align:center; z-index:8; gap:14px; }
  #win.show { display:flex; animation:fade .4s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #win h1 { font-size:42px; margin:0; text-shadow:0 3px 16px rgba(0,0,0,.5); }
  #win p { margin:0; font-size:17px; font-weight:700; }
  #again { margin-top:6px; background:var(--water); color:#fff; border:none; border-radius:14px; padding:14px 30px; font-weight:900; font-size:18px; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,.3); }
  #rotate { position:fixed; top:calc(env(safe-area-inset-top,8px) + 96px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.6); color:#fff; padding:8px 14px; border-radius:16px; font-weight:700; font-size:13px; pointer-events:none; opacity:0; transition:opacity .4s ease; z-index:6; white-space:nowrap; }
  #rotate.show { opacity:1; }
  #mute { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 92px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:16px; line-height:1; }
  #achBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 14px); top:calc(env(safe-area-inset-top,0px) + 132px); background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:9px 12px; font-weight:800; box-shadow:0 3px 10px rgba(0,0,0,.18); cursor:pointer; z-index:4; font-size:13px; }
  #mute:active, #achBtn:active { transform:scale(.95); } #mute.off { opacity:.55; }
  .g-btns { display:flex; flex-direction:column; gap:4px; align-items:stretch; }
  .g-btn.upg { background:#e89a2a; color:#fff; } .g-btn.maxed { background:#f0d8a0; color:#7a5a10; }
  #badges { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(10,30,40,.55); z-index:9; }
  #badges.show { display:flex; animation:fade .3s ease; }
  .b-box { background:#fff; border-radius:16px; padding:16px; width:min(94vw,440px); max-height:84vh; overflow:auto; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .b-box h2 { margin:0 0 10px; font-size:18px; color:var(--ink); }
  #b-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .b-item { background:#f2f5f7; border-radius:12px; padding:10px; text-align:center; color:var(--ink); }
  .b-item.locked { opacity:.45; filter:grayscale(1); }
  .b-item .b-ic { font-size:30px; line-height:1.2; } .b-item b { display:block; font-size:13px; margin-top:2px; } .b-item small { display:block; font-size:10px; opacity:.7; line-height:1.3; }
  #b-close { margin-top:10px; width:100%; background:var(--panel); color:var(--ink); border:none; border-radius:12px; padding:11px; font-weight:800; cursor:pointer; }
  #achToast { position:fixed; left:50%; top:calc(env(safe-area-inset-top,8px) + 150px); transform:translateX(-50%); background:rgba(184,134,11,.96); color:#fff; padding:10px 18px; border-radius:18px; font-weight:800; font-size:14px; box-shadow:0 4px 14px rgba(0,0,0,.3); opacity:0; transition:opacity .4s ease; pointer-events:none; z-index:7; text-align:center; white-space:nowrap; }
  #achToast.show { opacity:1; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="hud-top">
    <div class="badge" id="lv-badge">LV<span id="lvnum">1</span></div>
    <div class="badge" id="b-work">🏗 <span id="workLabel">作業場</span> <span class="v" id="work">0</span><small>%</small></div>
    <div class="badge" id="b-main">💧 <span id="mainLabel">ため池</span> <span class="v" id="basin">0</span><small>/<span id="basinT">0</span> m³</small></div>
    <div class="badge" id="total-badge">全体の水 <span class="v" id="total">0</span><small> m³</small></div>
    <div class="badge" id="money-badge">💴 <span class="v" id="money">0</span><small> 万円</small></div>
    <div class="badge" id="blade-badge">🪣 <span class="v" id="blade">0</span><small>/<span id="bladeCap">12</span> m³</small></div>
  </div>
  <div id="goal"><div class="label" id="goalLabel">…</div><div id="bar"><i></i></div></div>
  <div id="dpad">
    <button class="dbtn" id="d-up" data-dir="up" aria-label="前">▲</button>
    <button class="dbtn" id="d-left" data-dir="left" aria-label="左">◀</button>
    <button class="dbtn" id="d-right" data-dir="right" aria-label="右">▶</button>
    <button class="dbtn" id="d-down" data-dir="down" aria-label="後">▼</button>
  </div>
  <button id="act">ならす<span>押す</span></button>
  <button id="reset">最初から</button>
  <button id="shop">🛒 ショップ</button>
  <button id="machineBtn" style="display:none">🚜 ブル<span>切替</span></button>
  <button id="truckBtn">🚛 トラック召喚</button>
  <button id="mute" aria-label="音">🔊</button>
  <button id="achBtn">🏅 実績</button>
  <div id="hint">…</div>
  <div id="rotate">📱 横向きがおすすめ</div>
  <div id="garage"><div class="g-box"><h2>🛒 重機ショップ</h2><div id="g-list"></div><button id="g-close">とじる</button></div></div>
  <div id="badges"><div class="b-box"><h2>🏅 実績バッジ</h2><div id="b-list"></div><button id="b-close">とじる</button></div></div>
  <div id="achToast"></div>
  <div id="win"><h1 id="win-title">完成！</h1><p id="win-text"></p><button id="again">次のレベルへ ▶</button></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  "use strict";
  (function () {
    if (!window.THREE) { document.body.innerHTML = "<p style='color:#fff;padding:20px'>3D部品(Three.js)の読み込みに失敗しました。</p>"; return; }

    // ===================== 設定 =====================
    const GRID = 36, WORLD = 24, V = GRID + 1, N = V * V;
    const CELL_AREA = (WORLD / GRID) * (WORLD / GRID);
    const MIN_H = -4, MAX_H = 9;
    const MOVE_SPEED = 7;
    const DIG_RADIUS = 2.2, DIG_RATE = 18, LAYER = 0.8, STROKE_DIST = 5.0;
    const FLAT_TOL = 0.4;
    const CAM_DIST = 26, CAM_MIN = 12, CAM_MAX = 46, LOOK_SENS = 0.005, PITCH_MIN = 0.45, PITCH_MAX = 1.30;
    // 水[追加]
    const WATER_EPS = 0.02, RENDER_EPS = 0.0015, SHALLOW_GROUND = -0.1, PLAIN_MIN = 0.08;
    let GF = 11.0, FLUX_DAMP = 0.995; const WATER_SUBSTEPS = 4;
    const ENTER_WATER_MAX = 0.7, UNDERWATER_DIG_MULT = 0.5; let WATER_CAN_ENTER = false;
    // バックホウ本物掘削[本体移植 2026-06-25]：掘り下げ/積み上げを「今いる場所(足元)の高さ」から一定で頭打ち（段切り＝降りればさらに深く/積んだ上に乗ればさらに高く）。容量=その重機のバケット(bladeCap)・掘る速さ=digRate・範囲=digRadius。
    const BH_MAX_CUT = 3.0, BH_MAX_FILL = 2.5;
    const CLEAR_REWARD = 100; // 万円（クリア報酬）
    // 重機レベルアップ（強化）テーブル＝digRate/digRadius/moveSpeed の倍率（index=Lv, Lv0=未強化）
    const UPG_MAX = 5;
    const UPG_RATE = [1.0, 1.18, 1.36, 1.55, 1.75, 2.0];   // 掘る速さ
    const UPG_RAD  = [1.0, 1.06, 1.12, 1.18, 1.24, 1.30];  // 削る幅（広げ過ぎ注意で控えめ）
    const UPG_SPD  = [1.0, 1.08, 1.16, 1.24, 1.32, 1.40];  // 移動速さ
    function upgCost(M, lv) { // 現Lv(0..UPG_MAX-1)→lv+1 の費用(万円)。値段帯で段階化
      const p = M.price || 0;
      const base = p < 200 ? 40 : (p < 400 ? 70 : (p < 600 ? 110 : 160));
      return base * (lv + 1);
    }
    // 重機ラインナップ（メーカー別・もじり名＝架空。値段は強い/大きいほど高い）。
    const MAKERS = [
      { id: 'komashi', name: 'コマシ', sub: '(コマツ風)', dot: '🟡' },
      { id: 'kuboki', name: 'クボキ', sub: '(クボタ風)', dot: '🟢' },
      { id: 'hidachi', name: 'ヒダチ', sub: '(日立建機風)', dot: '🔵' },
      { id: 'caterpia', name: 'キャタピア', sub: '(Cat風)', dot: '🟠' },
      { id: 'koveriko', name: 'コベリコ', sub: '(コベルコ風)', dot: '🟣' },
      { id: 'borugo', name: 'ボルゴ', sub: '(ボルボ風)', dot: '🔴' },
      { id: 'sumiken', name: 'スミケン', sub: '(住友建機風)', dot: '⚪' },
      { id: 'yanama', name: 'ヤナマ', sub: '(ヤンマー風)', dot: '🟤' },
      { id: 'isuzu2', name: 'イスズ', sub: '(いすゞ風)', dot: '🔷' }
    ];
    function makerById(id) { for (let k = 0; k < MAKERS.length; k++) if (MAKERS[k].id === id) return MAKERS[k]; return MAKERS[0]; }
    const MACHINES = [
      { id: 'dozer', maker: 'komashi', name: 'コマシ D-51', icon: '🚜', price: 0, ability: '標準のブルドーザー',
        digRadius: 2.2, digRate: 18, layer: 0.8, moveSpeed: 7, bladeCap: 12, color: 0xf0c020, canEnterWater: false, underwaterFull: false },
      { id: 'bigdozer', maker: 'komashi', name: 'コマシ D-155', icon: '🏗️', price: 400, ability: '大型ブル・削る幅がとても広い＋整地が速い（移動は遅め）',
        digRadius: 3.2, digRate: 22, layer: 0.8, moveSpeed: 5.5, bladeCap: 20, color: 0x8a9a3a, canEnterWater: false, underwaterFull: false },
      { id: 'mini', maker: 'kuboki', name: 'クボキ U-08', icon: '🛺', price: 150, ability: '高速ミニ・移動がとても速い＋小回り（幅/容量は小さめ）',
        digRadius: 1.5, digRate: 16, layer: 0.8, moveSpeed: 11, bladeCap: 8, color: 0x88dd44, canEnterWater: false, underwaterFull: false },
      { id: 'kx12', maker: 'kuboki', name: 'クボキ KX-12', icon: '🛠️', price: 220, ability: 'ミニ掘削・小型で機敏＋そこそこ深く掘れる',
        digRadius: 1.6, digRate: 18, layer: 1.1, moveSpeed: 9, bladeCap: 10, color: 0x70c860, canEnterWater: false, underwaterFull: false },
      { id: 'sub', maker: 'hidachi', name: 'ヒダチ ZX-AQUA', icon: '🤿', price: 300, ability: '水中バックホウ・深い水に入れる＋水中も普通に掘れる',
        digRadius: 2.2, digRate: 18, layer: 0.8, moveSpeed: 6, bladeCap: 12, color: 0x3aa0e0, canEnterWater: true, underwaterFull: true },
      { id: 'digger', maker: 'hidachi', name: 'ヒダチ EX-450', icon: '⛏️', price: 450, ability: '強力掘削・1押しで深く掘れる＋掘る速さUP（幅は狭め）',
        digRadius: 1.8, digRate: 24, layer: 1.4, moveSpeed: 6.5, bladeCap: 18, color: 0x808890, canEnterWater: false, underwaterFull: false },
      { id: 'hauler', maker: 'caterpia', name: 'キャタピア 963', icon: '🚛', price: 500, ability: '大容量運搬・土をたくさん運べる＋削る幅が広い（移動やや遅め）',
        digRadius: 2.8, digRate: 18, layer: 0.8, moveSpeed: 6, bladeCap: 30, color: 0xe07a3a, canEnterWater: false, underwaterFull: false },
      { id: 'd11', maker: 'caterpia', name: 'キャタピア D-11改', icon: '🦏', price: 800, ability: '超大型ブル・最大の幅＋最大の容量（最高峰だが移動はとても遅い）',
        digRadius: 3.6, digRate: 24, layer: 1.2, moveSpeed: 4.5, bladeCap: 40, color: 0xc25a20, canEnterWater: false, underwaterFull: false },
      { id: 'sk200', maker: 'koveriko', name: 'コベリコ SK-200', icon: '🦾', price: 350, ability: '中型バックホウ・掘りも整地もそこそこのバランス掘削',
        digRadius: 2.0, digRate: 20, layer: 1.2, moveSpeed: 6.5, bladeCap: 14, color: 0x9a5ad0, canEnterWater: false, underwaterFull: false },
      { id: 'skaqua', maker: 'koveriko', name: 'コベリコ SK-AQUA改', icon: '🌊', price: 650, ability: '大型水中バックホウ・深い水で幅広に掘れる（水中の上位機）',
        digRadius: 2.6, digRate: 20, layer: 1.0, moveSpeed: 5.5, bladeCap: 18, color: 0x6060c8, canEnterWater: true, underwaterFull: true },
      { id: 'l90', maker: 'borugo', name: 'ボルゴ L-90', icon: '🚚', price: 380, ability: 'ホイールローダー・速く走って土を運ぶ＋そこそこ容量',
        digRadius: 2.4, digRate: 18, layer: 0.8, moveSpeed: 9, bladeCap: 22, color: 0xd03838, canEnterWater: false, underwaterFull: false },

      const sub = dt / WATER_SUBSTEPS; for (let s = 0; s < WATER_SUBSTEPS; s++) simWater(sub); syncWater(dt);
      updateParticles(dust, dt, 4.5); updateParticles(chunk, dt, 9.0); updateParticles(splash, dt, 6.0);
      if (shake > 0) shake = Math.max(0, shake - dt * 0.4);
      hudAccum += dt; if (hudAccum > 0.15) { hudAccum = 0; refreshHUD(); checkWin(); }
      updateCamera(); renderer.render(scene, camera); requestAnimationFrame(loop);
    }
    document.addEventListener("visibilitychange", () => { if (document.hidden) { clearKeys(); SND.drive(false, false); } else { SND.unlock(); if (!running) { running = true; last = performance.now(); requestAnimationFrame(loop); } } });
    // 初回ユーザー操作で音を解錠（モバイル自動再生ポリシー。unlockはidempotent＝何度呼んでも安全）
    ['pointerdown', 'keydown', 'touchstart'].forEach(function (ev) { window.addEventListener(ev, function () { SND.unlock(); }, { passive: true }); });

    // 起動
    if (!load()) loadLevel(0);
    if (UNLOCK_ALL) { game.owned = MACHINES.map(function (m) { return m.id; }); if (game.money < 9000000) game.money = 9999999; applyMachine(); refreshHUD(); }   // 検証用(?all)：18台全解放+資金潤沢[親方FB]
    normalsDone = false; syncGeometry(); syncWater(0); refreshHUD(); resize(); requestAnimationFrame(loop); setInterval(save, 8000);

    // デバッグ用フック
    if (/[?&]test\b/.test(location.search)) window.__t = {
      game, keys, heights, waterD, simWater, syncWater, syncGeometry, gradePush, updateDozer, camera, sampleHeight, sampleWater,
      totalWater, zoneVol, zoneMaxDev, zoneFlatness, levelDone, checkWin, loadLevel, refreshHUD, N, V, GRID,
      getLevel: () => curLevel, getLV: () => LV, getFps: () => fpsEMA,
      setYaw: (y) => { camYaw = y; }, getYaw: () => camYaw, getCamDist: () => camDist, setCamDist: (v) => { camDist = Math.max(CAM_MIN, Math.min(CAM_MAX, v)); }, CAM_MIN: CAM_MIN, CAM_MAX: CAM_MAX, setActing: (v) => { acting = v; }, getActing: () => acting,
      setCanEnterWater: (v) => { WATER_CAN_ENTER = v; }, setGF: (v) => { GF = v; }, setDamp: (v) => { FLUX_DAMP = v; },
      getMoney: () => game.money, setMoney: (v) => { game.money = v; refreshHUD(); }, getMachine: () => game.machine, getOwned: () => game.owned.slice(), getBlade: () => game.blade, curM: () => curM(), MACHINES: MACHINES, REWARD: CLEAR_REWARD,
      getBucket: () => game.bucket, backhoeDig: (dt) => backhoeDig(dt || 0.05), backhoeDump: (dt) => backhoeDump(dt || 0.05), kindOf: (id) => machineKind(id ? machineById(id) : curM()), bhMode: () => bhMode,
      soilTotal: () => { let s = 0; for (let i = 0; i < N; i++) s += heights[i]; return s * CELL_AREA + game.blade + game.bucket + truckLoad; },
      getTruckLoad: () => truckLoad, setTruckLoad: (v) => { truckLoad = v; updateTruckBed(); }, getDriving: () => driving, setDriving: (d) => { driving = d; }, hasTruck: () => !!truck, callTruck: () => summonTruck(), truckPos: () => truck ? { x: +truckX.toFixed(2), z: +truckZ.toFixed(2), load: +truckLoad.toFixed(1), cap: TRUCK_CAP } : null,
      setPos: (x, z, y) => { game.mx = x; game.mz = z; if (y != null) game.myaw = y; }, setBlade: (v) => { game.blade = v; }, setBucket: (v) => { game.bucket = v; },
      buyMachine: (id) => { const m = machineById(id); game.money -= m.price; if (game.owned.indexOf(id) < 0) game.owned.push(id); game.machine = id; applyMachine(); refreshHUD(); },
      setMachine: (id) => { if (game.owned.indexOf(id) < 0) game.owned.push(id); game.machine = id; applyMachine(); if (!canStand(game.mx, game.mz)) findDryStart(); refreshHUD(); },
      look: () => ({ scale: +dozer.scale.x.toFixed(3), kind: machineKind(curM()), id: curM().id, meshCount: activeModel ? countMeshes(activeModel) : 0, blade: !!activeBlade, arm: !!activeArm, loader: !!activeLoader, dump: !!activeDump }),
      bladePilePose: () => ({ y: +bladePile.position.y.toFixed(3), sx: +bladePile.scale.x.toFixed(3), sy: +bladePile.scale.y.toFixed(3), sz: +bladePile.scale.z.toFixed(3), visible: bladePile.position.y > -900, px: +bladePile.position.x.toFixed(2), pz: +bladePile.position.z.toFixed(2) }),
      partPose: () => ({ bladeY: activeBlade ? +activeBlade.position.y.toFixed(4) : null, bladeRx: activeBlade ? +activeBlade.rotation.x.toFixed(4) : null, boomRx: activeArm ? +activeArm.boom.rotation.x.toFixed(4) : null, stickRx: activeArm ? +activeArm.stick.rotation.x.toFixed(4) : null, bucketRx: activeArm ? +activeArm.bucket.rotation.x.toFixed(4) : null }),
      bucketLoadPose: () => (activeArm && activeArm.load) ? ({ hasArm: true, visible: activeArm.load.visible, sx: +activeArm.load.scale.x.toFixed(3), sy: +activeArm.load.scale.y.toFixed(3) }) : ({ hasArm: false }),
      pulseBlade: () => { digFx(true); updateDozer(0.016); return window.__t.partPose(); },
      armStep: (action, dt) => { animateArm(dt || 0.05, action || null); return window.__t.partPose(); },
      getShake: () => shake,
      getUpg: () => JSON.parse(JSON.stringify(game.upg)), getCum: () => JSON.parse(JSON.stringify(game.cum)), getAch: () => Object.keys(game.unlockedAch),
      buyUpgrade: (id) => buyUpgrade(id), upgCostOf: (id) => upgCost(machineById(id), upgLv(id)), upgLvOf: (id) => upgLv(id),
      effStats: (id) => JSON.parse(JSON.stringify(effectiveStats(machineById(id)))), checkAch: () => checkAchievements(), isMuted: () => SND.isMuted(), SND: SND, MAKERS: MAKERS,
      fluxStats: () => { let mx = 0; for (let k = 0; k < N; k++) { const f = Math.abs(fR[k] - fL[k]) + Math.abs(fB[k] - fT[k]); if (f > mx) mx = f; } return { maxFlux: mx }; },
      hasNaN: () => { for (let k = 0; k < N; k++) if (!isFinite(waterD[k]) || !isFinite(fL[k])) return true; return false; }
    };
  })();
  </script>
