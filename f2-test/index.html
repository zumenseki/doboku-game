<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>土木ゲーム 第1弾 試作</title>
<style>
  :root {
    --dig: #e07a1c;     /* 削る＝オレンジ */
    --fill: #2faa55;    /* 盛る＝みどり */
    --ink: #20303a;
    --panel: rgba(255,255,255,0.82);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #bfe3f2;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; overscroll-behavior: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* 上部：削った土の量 */
  #hud-top {
    position: fixed; top: env(safe-area-inset-top, 8px); left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px; pointer-events: none; padding: 8px env(safe-area-inset-right,8px) 0 env(safe-area-inset-left,8px);
  }
  .badge {
    background: var(--panel); color: var(--ink); border-radius: 14px;
    padding: 7px 14px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    font-variant-numeric: tabular-nums;
  }
  .badge small { font-weight: 700; opacity: .7; font-size: .72em; }
  #dug.pop { animation: pop .28s ease; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.28)} 100%{transform:scale(1)} }
  #carry-badge.full { animation: fullflash .5s ease; background: #ffe08a; }
  #bucket-badge.full { animation: fullflash .5s ease; background: #ffe08a; }
  @keyframes fullflash { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

  /* 目標バー */
  #goal {
    position: fixed; top: calc(env(safe-area-inset-top,8px) + 52px); left: 50%; transform: translateX(-50%);
    width: min(64vw, 320px); background: var(--panel); border-radius: 12px; padding: 7px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); pointer-events: none; max-width: calc(100vw - 24px);
  }
  #goal .label { font-size: 12px; font-weight: 700; color: var(--ink); opacity: .8; margin-bottom: 4px; }
  #bar { height: 9px; background: #d6dee2; border-radius: 6px; overflow: hidden; }
  #bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#e0a020,#2faa55); transition: width .15s ease; }
  #score-line { font-size: 12px; font-weight: 800; color: var(--ink); margin-top: 5px; text-align: center; font-variant-numeric: tabular-nums; }
  #score-line b { font-size: 15px; }
  #score.pop { animation: pop .28s ease; }

  /* 完成ボタン（合格点で出現） */
  #finish {
    position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 26px); transform: translateX(-50%);
    display: none; background: var(--fill); color: #fff; border: none; border-radius: 16px;
    padding: 13px 26px; font-weight: 900; font-size: 16px; box-shadow: 0 5px 16px rgba(0,0,0,.3); cursor: pointer; z-index: 5;
  }
  #finish.ready { display: block; animation: pop .3s ease; }
  #finish:active { transform: translateX(-50%) scale(.96); }
  #win .stars { font-size: 30px; letter-spacing: 4px; color: #ffd34d; }

  /* 左下：FPS風 方向パッド */
  #dpad {
    position: fixed; left: calc(env(safe-area-inset-left,0px) + 16px); bottom: calc(env(safe-area-inset-bottom,0px) + 18px);
    display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 6px; z-index: 4;
  }
  .dbtn {
    border: none; border-radius: 14px; background: var(--panel); color: var(--ink); font-size: 24px; font-weight: 900;
    box-shadow: 0 3px 10px rgba(0,0,0,.2); display: flex; align-items: center; justify-content: center; touch-action: none;
  }
  .dbtn:active, .dbtn.on { background: #cfe0ea; transform: scale(.94); }
  #d-up { grid-area: 1 / 2 / 2 / 3; }
  #d-left { grid-area: 2 / 1 / 3 / 2; }
  #d-right { grid-area: 2 / 3 / 3 / 4; }
  #d-down { grid-area: 3 / 2 / 4 / 3; }

  /* 右下：動作ボタン（押している間だけ 削る/盛る） */
  #act {
    position: fixed; right: calc(env(safe-area-inset-right,0px) + 18px); bottom: calc(env(safe-area-inset-bottom,0px) + 22px);
    width: 96px; height: 96px; border-radius: 50%; border: none; color: #fff; font-weight: 900; font-size: 21px;
    background: var(--dig); box-shadow: 0 6px 16px rgba(0,0,0,.28); cursor: pointer; line-height: 1.1; z-index: 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none;
  }
  #act span { font-size: 11px; font-weight: 700; opacity: .9; }
  #act.on { transform: scale(.93); filter: brightness(1.12); }

  /* 右上：リセット */
  #reset {
    position: fixed; right: calc(env(safe-area-inset-right,0px) + 14px); top: calc(env(safe-area-inset-top,0px) + 12px);
    background: var(--panel); color: var(--ink); border: none; border-radius: 12px; padding: 10px 13px;
    font-weight: 800; box-shadow: 0 3px 10px rgba(0,0,0,.18); cursor: pointer; z-index: 4; font-size: 13px;
  }
  #reset:active { transform: scale(.95); }

  /* 左上：機械チェンジ */
  #machine {
    position: fixed; left: calc(env(safe-area-inset-left,0px) + 14px); top: calc(env(safe-area-inset-top,0px) + 12px);
    background: var(--panel); color: var(--ink); border: none; border-radius: 12px; padding: 8px 13px;
    font-weight: 900; box-shadow: 0 3px 10px rgba(0,0,0,.18); cursor: pointer; z-index: 4; font-size: 14px;
    display: flex; flex-direction: column; align-items: center; line-height: 1.15; gap: 1px;
  }
  #machine span { font-size: 10px; font-weight: 700; opacity: .65; }
  #machine:active { transform: scale(.95); }

  /* 中央フラッシュ（モード切替） */
  #flash {
    position: fixed; left: 50%; top: 44%; transform: translate(-50%,-50%);
    font-weight: 900; font-size: 40px; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; z-index: 4;
  }
  #flash.show { animation: flash .7s ease; }
  @keyframes flash { 0%{opacity:0; transform:translate(-50%,-40%) scale(.8)} 25%{opacity:1} 100%{opacity:0; transform:translate(-50%,-55%) scale(1.1)} }

  /* ヒント */
  #hint {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    background: rgba(0,0,0,.55); color: #fff; padding: 9px 16px; border-radius: 18px; font-weight: 700; font-size: 13px;
    pointer-events: none; transition: opacity .5s ease; text-align: center; max-width: 86vw; line-height: 1.6;
  }

  /* 完成オーバーレイ */
  #win {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column;
    background: rgba(10,30,40,.55); color: #fff; text-align: center; z-index: 8; gap: 14px;
  }
  #win.show { display: flex; animation: fade .4s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #win h1 { font-size: 44px; margin: 0; text-shadow: 0 3px 16px rgba(0,0,0,.5); }
  #win p { margin: 0; font-size: 18px; font-weight: 700; }
  #again {
    margin-top: 6px; background: var(--fill); color: #fff; border: none; border-radius: 14px;
    padding: 14px 30px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 6px 16px rgba(0,0,0,.3);
  }

  /* 縦持ち案内（小さいトースト・画面は隠さない） */
  #rotate {
    position: fixed; top: calc(env(safe-area-inset-top,8px) + 96px); left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.6); color: #fff; padding: 8px 14px; border-radius: 16px; font-weight: 700; font-size: 13px;
    pointer-events: none; opacity: 0; transition: opacity .4s ease; z-index: 6; white-space: nowrap;
  }
  #rotate.show { opacity: 1; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="hud-top">
    <div class="badge"><span id="dug">0.0</span> <small>m³ 削った土</small></div>
    <div class="badge" id="carry-badge"><span id="carry">0.0</span> <small>m³ 今押してる土</small></div>
    <div class="badge" id="bucket-badge" style="display:none"><span id="bucket-hud">0.0</span> <small>/ 10 m³ バケット</small></div>
  </div>

  <div id="goal">
    <div class="label" id="goal-label">目標：お手本(緑の面)の高さに仕上げる　<span style="color:#c0392b">赤=削る</span>／<span style="color:#2a6db0">青=盛る</span>／<span style="color:#2faa55">緑=OK</span></div>
    <div id="bar"><i></i></div>
    <div id="score-line"><span id="scoreLabel">出来形</span> <b id="score">0</b> <span id="scoreUnit">点</span>　／　<span id="remLabel">目標まで最大</span> <b id="rem">0</b> <span id="remUnit">cm</span></div>
  </div>

  <!-- 左下：方向パッド -->
  <div id="dpad">
    <button class="dbtn" id="d-up" data-dir="up" aria-label="前">▲</button>
    <button class="dbtn" id="d-left" data-dir="left" aria-label="左">◀</button>
    <button class="dbtn" id="d-right" data-dir="right" aria-label="右">▶</button>
    <button class="dbtn" id="d-down" data-dir="down" aria-label="後">▼</button>
  </div>

  <button id="act">ならす<span>押す</span></button>
  <button id="reset">やり直し</button>
  <button id="machine">🚜 ブル<span>タップで切替</span></button>
  <button id="finish">この出来で完成</button>

  <div id="flash"></div>
  <div id="hint">お手本(緑の面)の高さに地面を合わせよう<br><b>緑の所から押し始める</b>と目標の高さに揃う・赤を削り青を埋めて全部緑に</div>
  <div id="rotate">📱 横向きがおすすめ</div>

  <div id="win">
    <h1>完成！</h1>
    <div class="stars" id="win-stars">★★★</div>
    <p id="win-text">整地おつかれさま</p>
    <button id="again">次の現場へ</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  "use strict";
  (function () {
    if (!window.THREE) { document.body.innerHTML = "<p style='color:#fff;padding:20px'>3D部品(Three.js)の読み込みに失敗しました。ネット接続を確認してください。</p>"; return; }

    // ===================== 設定 =====================
    const GRID = 24, WORLD = 24, V = GRID + 1;
    const CELL_AREA = (WORLD / GRID) * (WORLD / GRID);
    const MIN_H = -4, MAX_H = 9;
    const MOVE_SPEED = 7;
    const BLADE_CAP = 12, STALL_FRAC = 0.35, PILE_R = 1.6, UNLOAD_RATE = 14;  // ブル押し[親方FB・ハイブリッド]：持てる土量/満杯時速度割合(35%)/積む半径/置いていく速さ(ならすを離して移動中)
    const DIG_RADIUS = 2.2, DIG_RATE = 18, LAYER = 0.8, STROKE_DIST = 5.0;
    const BH_REACH = 2.1, BH_DIG_R = 1.7, BH_DIG_RATE = 13, BUCKET_CAP = 10, BH_DUMP_RATE = 16, BH_MAX_CUT = 3.0, BH_MAX_FILL = 2.5;  // バックホウ[F2]：腕の届く距離/掘る半径/掘る速さ/バケット上限/降ろす速さ/掘り下げ上限/積み上げ上限(共に元の地面baseHeightsから・親方FB 2026-06-25「深さ・高さを一定に＝塔/深穴の不自然を防ぐ」)
    const FLAT_TOL = 0.3, PASS_SCORE = 70, STAR2 = 85, STAR3 = 95, FINISH_MAXDEV = 0.5, FINISH_MAXDEV_DIG = 1.5;
    const CAM_DIST = 26, LOOK_SENS = 0.005, PITCH_MIN = 0.45, PITCH_MAX = 1.30;
    // 水[F5・water-protoから移植]：仮想パイプ法(浅水＋慣性)。表示しきい/浅地/物理/連動の各定数。
    const N = V * V;
    const WATER_EPS = 0.02, RENDER_EPS = 0.0015, SHALLOW_GROUND = -0.1, PLAIN_MIN = 0.08;
    let GF = 11.0, FLUX_DAMP = 0.995; const WATER_SUBSTEPS = 4;
    const ENTER_WATER_MAX = 0.7, UNDERWATER_DIG_MULT = 0.5; let WATER_CAN_ENTER = false;

    // ===================== ルール層 =====================
    const heights = new Float32Array(V * V);
    const baseHeights = new Float32Array(V * V);
    const targetH = new Float32Array(V * V);   // お題＝目標の高さ（マスごと）
    const vx = new Float32Array(V * V), vz = new Float32Array(V * V);
    const passRef = new Float32Array(V * V), passTag = new Int32Array(V * V); // この押しで初接触した高さ / 押しID（1段ずつ削るため）
    const waterD = new Float32Array(N);   // 水[F5]：各頂点の水深
    const fL = new Float32Array(N), fR = new Float32Array(N), fT = new Float32Array(N), fB = new Float32Array(N);  // 水[F5]：隣4方向の流量（フレーム跨ぎ保持＝慣性）
    const game = { blade: 0, bucket: 0, totalDug: 0, initErr: 1, targetLevel: 0, best: 0, mx: 0, mz: 6, myaw: Math.PI, won: false, soil0: 0 };
    let camYaw = 0, camPitch = 0.95, pushing = false, cutHeight = 0, pushId = 0, strokeX = 0, strokeZ = 0;
    // 機械2台[F2]：ブル(dozer)とバックホウ(backhoe)。game.mx/mz/myaw は「選択中の機械」の現在位置を映す。切替時に flushActive で退避→新機械を読み込む。
    const dozerState = { mx: 0, mz: 6, myaw: Math.PI };
    const backhoeState = { mx: 5, mz: 6, myaw: Math.PI };
    let active = "dozer";
    let bhMode = null, prevActing = false, bhPhase = 0, bhDigAmt = 0, bhDumpAmt = 0;  // バックホウ：押し始めに固定する掘る/降ろすモード・うでアニメ状態[F2]
    // バックホウ[F2-S5]：1回押すごとに「掘る/盛る」を1段(LAYER)までに制限（あり得ない高さの山・谷を防ぐ）。押し始めの高さを bhRef に記録し ±LAYER で頭打ち。離して押し直すと bhPushId が進み次の段へ。
    const bhRef = new Float32Array(V * V), bhTag = new Int32Array(V * V); let bhPushId = 0;
    function flushActive() { const s = (active === "dozer") ? dozerState : backhoeState; s.mx = game.mx; s.mz = game.mz; s.myaw = game.myaw; }

    for (let j = 0; j < V; j++) for (let i = 0; i < V; i++) {
      const idx = j * V + i; vx[idx] = (i / GRID - 0.5) * WORLD; vz[idx] = (j / GRID - 0.5) * WORLD;
    }
    function gauss(x, z, cx, cz, h, s) { const d2 = (x - cx) * (x - cx) + (z - cz) * (z - cz); return h * Math.exp(-d2 / (2 * s * s)); }
    function generateTerrain(scene) {
      game.scene = (scene === "dig") ? "dig" : (scene === "tank") ? "tank" : "flat";
      clearWater();
      if (game.scene === "tank") {
        buildTankScene();
        baseHeights.set(heights);
      } else if (game.scene === "dig") {
        buildDigScene();
        baseHeights.set(heights);
      } else {
        const hx = -4 + (Math.random() - 0.5) * 4, hz = -2 + (Math.random() - 0.5) * 4, hH = 3.6 + Math.random() * 1.2;
        const px = 5 + (Math.random() - 0.5) * 3, pz = 5 + (Math.random() - 0.5) * 3;
        for (let idx = 0; idx < V * V; idx++) {
          const x = vx[idx], z = vz[idx];
          let h = gauss(x, z, hx, hz, hH, 3.0) - gauss(x, z, px, pz, 1.8, 2.4) + (Math.random() - 0.5) * 0.15;
          if (h < MIN_H) h = MIN_H; if (h > MAX_H) h = MAX_H;
          heights[idx] = h;
        }
        baseHeights.set(heights); setTarget();
      }
      game.initErr = Math.max(1, targetError()); game.soil0 = currentSoil(); updateGhost(); ghost.visible = (game.scene !== "tank"); setSceneHint();
    }
    // 掘る現場[F2-S4]：初期=平ら(h0)／目標=手前に池(掘る)＋奥に盛り場(盛る)。掘る量＝盛る量で体積中立＝必ず達成可能。
    function buildDigScene() {
      const h0 = 1.0;
      for (let idx = 0; idx < V * V; idx++) { heights[idx] = h0; targetH[idx] = h0; }
      // 池[S5]：底は平ら(バックホウで掘りやすい＝段で揃えられる)＋縁だけ斜面。底の高さ＝h0-pitDepth。
      const pitCx = 0, pitCz = 3.5, pitR = 4.2, pitFlat = 2.6, pitDepth = 2.2;
      let removed = 0;
      for (let idx = 0; idx < V * V; idx++) {
        const d = Math.sqrt((vx[idx] - pitCx) * (vx[idx] - pitCx) + (vz[idx] - pitCz) * (vz[idx] - pitCz));
        if (d < pitR) {
          let drop;
          if (d <= pitFlat) drop = pitDepth;                                            // 平らな底
          else { const t = (d - pitFlat) / (pitR - pitFlat); drop = pitDepth * 0.5 * (1 + Math.cos(Math.PI * t)); } // 縁の斜面
          targetH[idx] -= drop; removed += drop;
        }
      }
      // 盛り場[S5]：平らな台地(フラットトップ)＝バックホウで降ろして埋めやすい。中心 pileFlat は一定の高さ、縁だけ斜面。掘った体積(removed)をそのまま分配＝体積中立。
      const pileCx = 0, pileCz = -5, pileFlat = 3.0, pileR = 4.6; let wsum = 0; const w = new Float32Array(V * V);
      for (let idx = 0; idx < V * V; idx++) {
        const d = Math.sqrt((vx[idx] - pileCx) * (vx[idx] - pileCx) + (vz[idx] - pileCz) * (vz[idx] - pileCz));
        if (d <= pileFlat) { w[idx] = 1; wsum += 1; }                                                  // 平らな天端
        else if (d < pileR) { const tt = (d - pileFlat) / (pileR - pileFlat); const f = 0.5 * (1 + Math.cos(Math.PI * tt)); w[idx] = f; wsum += f; }  // 縁の斜面
      }
      if (wsum > 0) for (let idx = 0; idx < V * V; idx++) if (w[idx] > 0) targetH[idx] += removed * w[idx] / wsum;
      for (let idx = 0; idx < V * V; idx++) { if (targetH[idx] < MIN_H) targetH[idx] = MIN_H; if (targetH[idx] > MAX_H) targetH[idx] = MAX_H; }
      game.targetLevel = h0;
    }
    // お題（目標の高さ）＝この現場の平均高さに広く平らに（宅地造成）。押し均しの体積保存で達成可能。
    function setTarget() { let mean = 0; for (let idx = 0; idx < V * V; idx++) mean += baseHeights[idx]; game.targetLevel = mean / (V * V); for (let idx = 0; idx < V * V; idx++) targetH[idx] = game.targetLevel; }
    // 水の現場[F5]：調整池。手前=作業場(水浸し+デコボコ)／奥=ため池(深い穴)／間に土手。土手に水路を掘って作業場を排水→ため池に貯水→作業場を平らに。
    const TANK_DRAIN_WIN = 0.85, TANK_MAXDEV = 0.7, TANK_TFRAC = 0.5;  // 排水率/作業場の平ら/ため池目標(全水量比)
    function zoneEach(z, cb) { for (let j = z.j0; j <= z.j1; j++) for (let i = z.i0; i <= z.i1; i++) cb(j * V + i); }
    function zoneVol(z) { let s = 0; zoneEach(z, (idx) => { s += waterD[idx]; }); return s * CELL_AREA; }
    function zoneMean(z) { let m = 0, n = 0; zoneEach(z, (idx) => { m += heights[idx]; n++; }); return n ? m / n : 0; }
    function zoneMaxDev(z) { const mean = zoneMean(z); let m = 0; zoneEach(z, (idx) => { const d = Math.abs(heights[idx] - mean); if (d > m) m = d; }); return m; }
    function zoneFlatness(z) { const mean = zoneMean(z); let s = 0; zoneEach(z, (idx) => { const d = Math.abs(heights[idx] - mean); if (d > FLAT_TOL) { const e = d - FLAT_TOL; s += e * e * CELL_AREA; } }); return s; }
    function drainOf(z, w0) { return w0 > 0 ? Math.max(0, Math.min(1, 1 - zoneVol(z) / w0)) : 0; }
    function tankDone() { return game.scene === "tank" && drainOf(game.tankA, game.tankA0) >= TANK_DRAIN_WIN && zoneMaxDev(game.tankA) <= TANK_MAXDEV && zoneVol(game.tankB) >= game.tankTB; }
    function tankProgress() {   // 0..1 の全体進捗（排水・平ら・ため池貯水の最小）
      const dr = Math.min(1, drainOf(game.tankA, game.tankA0) / TANK_DRAIN_WIN);
      const fl = Math.max(0, Math.min(1, 1 - zoneFlatness(game.tankA) / game.tankA0flat));
      const ba = game.tankTB > 0 ? Math.min(1, zoneVol(game.tankB) / game.tankTB) : 1;
      return Math.min(dr, fl, ba);
    }
    function buildTankScene() {
      const A = { i0: 4, i1: 20, j0: 14, j1: 23 };   // 作業場(手前+z側・水浸し)
      const B = { i0: 6, i1: 18, j0: 3, j1: 10 };     // ため池(奥-z側・深い穴)

    // ===================== リサイズ・ループ =====================

    }
    window.addEventListener("resize", resize); window.addEventListener("orientationchange", resize);

    let last = performance.now(), running = true;

    // ===================== 起動 =====================

    const forceScene = /[?&]dig\b/.test(location.search) ? "dig" : (/[?&]flat\b/.test(location.search) ? "flat" : (/[?&]tank\b/.test(location.search) ? "tank" : null));

idx] = -0.3; } zoneEach(A, (idx) => { heights[idx] = 0.2; }); for (let k = 0; k < 3500; k++) { const sub = 0.016 / WATER_SUBSTEPS; for (let s = 0; s < WATER_SUBSTEPS; s++) simWater(sub); } syncGeometry(); return true; }, bhPushId: () => bhPushId, maxDevRaw: () => { let m = 0; for (let j = 1; j < GRID; j++) for (let i = 1; i < GRID; i++) { const idx = j * V + i; const d = Math.abs(heights[idx] - targetH[idx]); if (d > m) m = d; } return m; }, solve: () => { heights.set(targetH); game.blade = 0; game.bucket = 0; syncGeometry(); refreshHUD(); }, solveNoisy: (amp, bias) => { for (let idx = 0; idx < V * V; idx++) heights[idx] = Math.max(MIN_H, Math.min(MAX_H, targetH[idx] + (Math.random() - 0.5) * 2 * (amp || 0) + (bias || 0))); game.blade = 0; game.bucket = 0; syncGeometry(); refreshHUD(); }, targetSoil: () => { let s = 0; for (let i = 0; i < V * V; i++) s += targetH[i]; return s * CELL_AREA; } };
